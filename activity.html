<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity & Rewards - All-in-One</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --grad: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --bg: #f0f2f5;
            --success: #00c851;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; padding-bottom: 50px; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; color: #333; }
        .stats-summary { background: var(--grad); color: white; padding: 25px; border-radius: 25px; margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1fr; box-shadow: 0 10px 20px rgba(37, 117, 252, 0.3); }
        .stat-small { text-align: center; }
        .stat-small span { font-size: 12px; opacity: 0.9; }
        .stat-small h4 { margin: 8px 0 0; font-size: 20px; }
        .active-tag { font-size: 12px; padding: 6px 15px; border-radius: 20px; margin: 10px 0; display: inline-block; font-weight: bold; }
        .sec-title { font-size: 16px; font-weight: bold; margin: 20px 0 10px; color: #444; display: flex; align-items: center; gap: 8px; }
        .roadmap-container { padding: 5px; }
        .roadmap-item { background: white; border-radius: 18px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); display: flex; align-items: center; gap: 12px; border-left: 5px solid #2575fc; }
        .icon-box { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .content { flex-grow: 1; }
        .content h3 { margin: 0; font-size: 13px; color: #333; }
        .content p { margin: 2px 0 0; font-size: 11px; color: #666; }
        .prog-bar-bg { width: 100%; height: 6px; background: #eee; border-radius: 10px; margin-top: 8px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--grad); border-radius: 10px; transition: 0.5s; }
        .claim-btn { background: var(--success); color: white; border: none; padding: 8px 15px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .claim-btn:disabled { background: #cbd5e0 !important; cursor: not-allowed; }
        .gift-box { background: white; padding: 15px; border-radius: 18px; display: flex; gap: 10px; margin-bottom: 20px; }
        .gift-box input { flex-grow: 1; border: 1px solid #ddd; padding: 10px; border-radius: 8px; outline: none; }
        .amt-display { font-weight: bold; color: #2575fc; font-size: 14px; margin-right: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <h2>Rewards & Activity</h2>
    </div>

    <div class="stats-summary">
        <div class="stat-small"><span>মূল ব্যালেন্স</span><h4 id="mainBalance">৳ 0.00</h4></div>
        <div class="stat-small"><span>বর্তমান র‍্যাঙ্ক</span><h4 id="userRank">General</h4></div>
    </div>

    <div id="activeStatus" class="active-tag">Checking...</div>

    <div class="sec-title"><i class="fas fa-stars"></i> Main Rewards</div>
    <div class="roadmap-container">
        <div class="roadmap-item" style="border-left-color: #3498db;">
            <div class="icon-box" style="background:#e1f5fe; color:#3498db;"><i class="fas fa-user-plus"></i></div>
            <div class="content"><h3>Daily Referral</h3><p>নতুন মেম্বার বোনাস</p></div>
            <div><span class="amt-display" id="referAmt">৳ 0</span><button class="claim-btn" id="referBtn" onclick="claimFieldBonus('refer_income')">Claim</button></div>
        </div>
        <div class="roadmap-item" style="border-left-color: #9b59b6;">
            <div class="icon-box" style="background:#f3e5f5; color:#9b59b6;"><i class="fas fa-users"></i></div>
            <div class="content"><h3>Level Income</h3><p>টিম প্রমোশন বোনাস</p></div>
            <div><span class="amt-display" id="levelAmt">৳ 0</span><button class="claim-btn" id="levelBtn" onclick="claimFieldBonus('level_income')">Claim</button></div>
        </div>
        <div class="roadmap-item" style="border-left-color: #2ecc71;">
            <div class="icon-box" style="background:#e8f5e9; color:#2ecc71;"><i class="fas fa-chart-line"></i></div>
            <div class="content"><h3>Daily ROI</h3><p>প্যাকেজ ডেইলি ইনকাম</p></div>
            <div><span class="amt-display" id="roiAmt">৳ 0</span><button class="claim-btn" id="roiBtn" onclick="claimFieldBonus('daily_roi')">Claim</button></div>
        </div>
    </div>

    <div class="sec-title"><i class="fas fa-key"></i> Gift Code Claim</div>
    <div class="gift-box">
        <input type="text" id="giftInput" placeholder="Enter Gift Code">
        <button class="claim-btn" style="background: var(--grad);" id="giftBtn" onclick="claimGift()">Submit</button>
    </div>

    <div class="sec-title"><i class="fas fa-users-cog"></i> Referral Target Rewards</div>
    <div class="roadmap-container" id="refTargetList"></div>

    <div class="sec-title"><i class="fas fa-wallet"></i> Deposit Target Rewards</div>
    <div class="roadmap-container" id="depositList"></div>

    <div class="sec-title"><i class="fas fa-dice"></i> Daily Betting Rewards</div>
    <div class="roadmap-container" id="bettingList"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, increment, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
            authDomain: "bengal-east-company-limited.firebaseapp.com",
            projectId: "bengal-east-company-limited",
            storageBucket: "bengal-east-company-limited.firebasestorage.app",
            messagingSenderId: "653223286483",
            appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const loggedUser = localStorage.getItem("loggedUser");

        let refTargets = [], depRewards = [], betRewards = [];

        async function fetchAdminRewards() {
            try {
                const refSnap = await getDoc(doc(db, "admin_settings", "referral_rewards"));
                if (refSnap.exists()) refTargets = Object.entries(refSnap.data()).map(([k,v])=>({t:parseInt(k), b:v})).sort((a,b)=>a.t-b.t);
                
                const depSnap = await getDoc(doc(db, "admin_settings", "deposit_targets"));
                if (depSnap.exists()) depRewards = Object.entries(depSnap.data()).map(([k,v])=>({t:parseInt(k), b:v})).sort((a,b)=>a.t-b.t);
                
                const betSnap = await getDoc(doc(db, "admin_settings", "betting_rewards"));
                if (betSnap.exists()) betRewards = Object.entries(betSnap.data()).map(([k,v])=>({t:parseInt(k), b:v})).sort((a,b)=>a.t-b.t);
            } catch (e) { console.error(e); }
        }

        async function getDailyBetTotal(userID) {
            try {
                const today = new Date().toISOString().split('T')[0];
                const betCols = ["head_tail_bets", "big_small_bets", "red_green_bets"];
                let total = 0;
                for(let col of betCols) {
                    const q = query(collection(db, col), where("userID", "==", userID), where("date", "==", today));
                    const snap = await getDocs(q);
                    snap.forEach(doc => total += (parseFloat(doc.data().amount) || 0));
                }
                return total;
            } catch(e) { return 0; }
        }

        async function getActiveTeamCount(userID) {
            try {
                const q = query(collection(db, "users"), where("referrerID", "==", userID));
                const snap = await getDocs(q);
                let count = 0;
                snap.forEach(d => { 
                    const dep = parseFloat(d.data().total_deposit) || 0;
                    if(dep >= 100) count++; 
                });
                return count;
            } catch(e) { return 0; }
        }

        async function renderDynamicLists(userData) {
            // "Checking" অবস্থা ফিক্স করার জন্য প্রসেস বার এবং স্ট্যাটাস লজিক
            const teamCount = await getActiveTeamCount(userData.userID);
            const dailyBet = await getDailyBetTotal(userData.userID);
            
            const totalDep = parseFloat(userData.total_deposit) || 0;
            const isActive = (totalDep >= 100);
            const today = new Date().toISOString().split('T')[0];

            // UI Update
            const statusEl = document.getElementById('activeStatus');
            if(isActive) {
                statusEl.innerHTML = `<span style="color:white; background:green; padding:6px 15px; border-radius:20px;">● Active Member</span>`;
            } else {
                statusEl.innerHTML = `<span style="color:white; background:red; padding:6px 15px; border-radius:20px;">● Not Active</span>`;
            }

            document.getElementById('referAmt').innerText = "৳ " + (userData.refer_income || 0);
            document.getElementById('levelAmt').innerText = "৳ " + (userData.level_income || 0);
            document.getElementById('roiAmt').innerText = "৳ " + (userData.daily_roi || 0);

            // Referral Render
            let rHtml = '';
            refTargets.forEach(item => {
                const claimed = (userData.claimed_ref_target || []).includes(item.t);
                const progress = Math.min((teamCount / item.t) * 100, 100);
                rHtml += `<div class="roadmap-item"><div class="content"><h3>${item.t} Active Team</h3><p>Bonus: ৳${item.b} (${teamCount}/${item.t})</p><div class="prog-bar-bg"><div class="prog-fill" style="width:${progress}%"></div></div></div><button class="claim-btn" ${(claimed || teamCount < item.t)?'disabled':''} onclick="claimTargetBonus('ref', ${item.t}, ${item.b})">${claimed?'Done':'Claim'}</button></div>`;
            });
            document.getElementById('refTargetList').innerHTML = rHtml;

            // Deposit Render
            let dHtml = '';
            depRewards.forEach(item => {
                const claimed = (userData.claimed_dep || []).includes(item.t);
                const progress = Math.min((totalDep / item.t) * 100, 100);
                dHtml += `<div class="roadmap-item"><div class="content"><h3>Deposit ৳${item.t}</h3><p>Bonus: ৳${item.b} (${totalDep}/${item.t})</p><div class="prog-bar-bg"><div class="prog-fill" style="width:${progress}%"></div></div></div><button class="claim-btn" ${(claimed || totalDep < item.t)?'disabled':''} onclick="claimTargetBonus('dep', ${item.t}, ${item.b})">${claimed?'Done':'Claim'}</button></div>`;
            });
            document.getElementById('depositList').innerHTML = dHtml;

            // Betting Render
            let bHtml = '';
            const betData = userData.daily_bet_claim || {};
            const claimedList = betData.date === today ? (betData.list || []) : [];
            betRewards.forEach(item => {
                const claimed = claimedList.includes(item.t);
                const progress = Math.min((dailyBet / item.t) * 100, 100);
                bHtml += `<div class="roadmap-item"><div class="content"><h3>Bet ৳${item.t} Daily</h3><p>Bonus: ৳${item.b} (${dailyBet}/${item.t})</p><div class="prog-bar-bg"><div class="prog-fill" style="width:${progress}%"></div></div></div><button class="claim-btn" ${(claimed || dailyBet < item.t)?'disabled':''} onclick="claimBetBonus(${item.t}, ${item.b})">${claimed?'Done':'Claim'}</button></div>`;
            });
            document.getElementById('bettingList').innerHTML = bHtml;
        }

        window.claimFieldBonus = async (field) => {
            try {
                const ref = doc(db, "users", loggedUser);
                const snap = await getDoc(ref);
                const amount = parseFloat(snap.data()[field]) || 0;
                if(amount > 0) { 
                    await updateDoc(ref, { balance: increment(amount), [field]: 0 }); 
                    alert("Claimed Successfully!"); 
                }
            } catch (e) { alert("Error!"); }
        };

        window.claimTargetBonus = async (type, target, amount) => {
            const ref = doc(db, "users", loggedUser);
            const d = (await getDoc(ref)).data();
            let field = type === 'ref' ? 'claimed_ref_target' : 'claimed_dep';
            if((d[field] || []).includes(target)) return;
            await updateDoc(ref, { balance: increment(amount), [field]: Array.from(new Set([...(d[field]||[]), target])) });
            alert("Reward Claimed!");
        };

        window.claimBetBonus = async (target, amount) => {
            const today = new Date().toISOString().split('T')[0];
            const ref = doc(db, "users", loggedUser);
            const d = (await getDoc(ref)).data();
            let betData = d.daily_bet_claim || { date: today, list: [] };
            if(betData.date !== today) betData = { date: today, list: [] };
            if(betData.list.includes(target)) return;
            betData.list.push(target);
            await updateDoc(ref, { balance: increment(amount), daily_bet_claim: betData });
            alert("Daily Bet Bonus Claimed!");
        };

        window.claimGift = async () => {
            const code = document.getElementById('giftInput').value.trim();
            if(!code) return alert("Enter code");
            const giftRef = doc(db, "gift_codes", code);
            const giftSnap = await getDoc(giftRef);
            if(!giftSnap.exists()) return alert("Invalid Code");
            const gData = giftSnap.data();
            if(gData.status !== "active") return alert("Already Used");
            await updateDoc(giftRef, { status: "used", usedBy: loggedUser });
            await updateDoc(doc(db, "users", loggedUser), { balance: increment(parseFloat(gData.amount)) });
            alert(`৳${gData.amount} Added!`);
            document.getElementById('giftInput').value = "";
        };

        function sync() {
            if(!loggedUser) return;
            onSnapshot(doc(db, "users", loggedUser), (snap) => {
                if (snap.exists()) {
                    const d = snap.data();
                    document.getElementById('mainBalance').innerText = "৳ " + (parseFloat(d.balance) || 0).toFixed(2);
                    document.getElementById('userRank').innerText = d.rank || "General";
                    renderDynamicLists(d);
                }
            });
        }

        window.onload = async () => { 
            await fetchAdminRewards(); 
            sync(); 
        };
    </script>
</body>
</html>
