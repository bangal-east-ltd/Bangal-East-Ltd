<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity & Rewards - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --grad: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --bg: #f0f2f5;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; color: #333; }
        
        /* বাটন স্টাইল */
        .reward-menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .menu-btn {
            background: white;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            border: 1px solid #eee;
        }
        .menu-btn:active {
            transform: scale(0.98);
        }
        .btn-info {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 16px;
        }
        .icon-circle {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
        }
        .arrow { color: #ccc; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-arrow-left" onclick="history.back()"></i>
        <h2>Rewards Center</h2>
    </div>

    <div class="reward-menu-container">
        
        <a href="main-reward.html" class="menu-btn">
            <div class="btn-info">
                <div class="icon-circle" style="background: #3498db;"><i class="fas fa-star"></i></div>
                <span>Main Rewards</span>
            </div>
            <i class="fas fa-chevron-right arrow"></i>
        </a>

        <a href="referral-target.html" class="menu-btn">
            <div class="btn-info">
                <div class="icon-circle" style="background: #9b59b6;"><i class="fas fa-users"></i></div>
                <span>Referral Target Rewards</span>
            </div>
            <i class="fas fa-chevron-right arrow"></i>
        </a>

        <a href="deposit-target.html" class="menu-btn">
            <div class="btn-info">
                <div class="icon-circle" style="background: #2ecc71;"><i class="fas fa-wallet"></i></div>
                <span>Deposit Target Rewards</span>
            </div>
            <i class="fas fa-chevron-right arrow"></i>
        </a>

        <a href="betting-reward.html" class="menu-btn">
            <div class="btn-info">
                <div class="icon-circle" style="background: #e67e22;"><i class="fas fa-dice"></i></div>
                <span>Daily Betting Rewards</span>
            </div>
            <i class="fas fa-chevron-right arrow"></i>
        </a>

        <a href="gift-code.html" class="menu-btn">
            <div class="btn-info">
                <div class="icon-circle" style="background: #e74c3c;"><i class="fas fa-gift"></i></div>
                <span>Gift Code Claim</span>
            </div>
            <i class="fas fa-chevron-right arrow"></i>
        </a>

    </div>

</body>
</html>
