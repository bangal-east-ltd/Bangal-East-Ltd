<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Bengal East</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; display: flex; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #11998e; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        .sidebar { width: 250px; background: #11998e; height: 100vh; color: white; padding: 20px; position: fixed; overflow-y: auto; }
        .sidebar h2 { margin-bottom: 30px; font-size: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        .sidebar nav p { padding: 12px; cursor: pointer; border-radius: 8px; transition: 0.3s; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .sidebar nav p:hover { background: rgba(255,255,255,0.1); }
        .sidebar nav p.active { background: white; color: #11998e; font-weight: bold; }
        .main-content { margin-left: 250px; width: calc(100% - 250px); padding: 30px; }
        .section { display: none; }
        .section.active { display: block; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid #11998e; }
        .admin-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 13px; }
        .btn { padding: 6px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .btn-success { background: #28a745; color: white; }
        .btn-danger { background: #dc3545; color: white; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="margin-bottom: 20px; color: #11998e;">Admin Login</h2>
        <input type="password" id="adminPassInput" placeholder="Password" style="width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd;">
        <button class="btn btn-success" style="width: 100%; padding: 12px;" onclick="checkAdminLogin()">Login</button>
    </div>
</div>

<div class="sidebar">
    <h2>Admin Panel</h2>
    <nav>
        <p class="active" onclick="showSection('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</p>
        <p onclick="showSection('users')"><i class="fas fa-users"></i> Users List</p>
        <p onclick="showSection('deposits')"><i class="fas fa-wallet"></i> Deposits</p>
        <p onclick="showSection('settings')"><i class="fas fa-cog"></i> Settings</p>
        <p onclick="adminLogout()" style="margin-top: 20px; color: #ffcccc;"><i class="fas fa-sign-out-alt"></i> Logout</p>
    </nav>
</div>

<div class="main-content">
    <div id="dashboard" class="section active">
        <div class="stats-grid">
            <div class="stat-card"><h4>Total Users</h4><h2 id="statTotalUsers">0</h2></div>
            <div class="stat-card"><h4>Total Deposit</h4><h2>৳ <span id="totalDep">0</span></h2></div>
        </div>
    </div>

    <div id="users" class="section">
        <div class="admin-card">
            <h2>Registered Users</h2>
            <table>
                <thead><tr><th>User ID</th><th>Phone</th><th>Balance</th></tr></thead>
                <tbody id="userListBody"></tbody>
            </table>
        </div>
    </div>

    <div id="deposits" class="section">
        <div class="admin-card">
            <h2>Pending Deposits</h2>
            <table>
                <thead><tr><th>User</th><th>Amount</th><th>TrxID</th><th>Method</th><th>Action</th></tr></thead>
                <tbody id="depositBody"></tbody>
            </table>
        </div>
    </div>

    <div id="settings" class="section">
        <div class="admin-card">
            <h2>Update Payment Numbers</h2>
            <div style="margin-bottom:10px;"><label>bKash:</label> <input type="text" id="setBkash"></div>
            <div style="margin-bottom:10px;"><label>Nagad:</label> <input type="text" id="setNagad"></div>
            <div style="margin-bottom:10px;"><label>Rocket:</label> <input type="text" id="setRocket"></div>
            <button class="btn btn-success" onclick="updateNumbers()">Update</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, doc, updateDoc, getDoc, setDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
        authDomain: "bengal-east-company-limited.firebaseapp.com",
        projectId: "bengal-east-company-limited",
        storageBucket: "bengal-east-company-limited.firebasestorage.app",
        messagingSenderId: "653223286483",
        appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.checkAdminLogin = function() {
        if(document.getElementById('adminPassInput').value === "123456") {
            localStorage.setItem("adminLoggedIn", "true");
            document.getElementById('loginOverlay').style.display = "none";
        } else { alert("Wrong Password!"); }
    }

    window.adminLogout = function() { localStorage.removeItem("adminLoggedIn"); location.reload(); }

    window.showSection = function(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // Load Users
    onSnapshot(collection(db, "users"), (snapshot) => {
        const list = document.getElementById('userListBody');
        list.innerHTML = "";
        let count = 0;
        snapshot.forEach(doc => {
            const u = doc.data(); count++;
            list.innerHTML += `<tr><td>${u.userID || 'N/A'}</td><td>${doc.id}</td><td>৳${u.balance || 0}</td></tr>`;
        });
        document.getElementById('statTotalUsers').innerText = count;
    });

    // Load Deposits
    onSnapshot(collection(db, "deposits"), (snapshot) => {
        const depBody = document.getElementById('depositBody');
        depBody.innerHTML = "";
        let total = 0;
        snapshot.forEach(child => {
            const d = child.data();
            if(d.status === "Pending") {
                depBody.innerHTML += `<tr><td>${d.user}</td><td>${d.amount}</td><td>${d.trxID}</td><td>${d.method}</td>
                <td><button class="btn btn-success" onclick="approveDep('${child.id}','${d.user}',${d.amount})">Approve</button></td></tr>`;
            } else if(d.status === "Success") { total += parseFloat(d.amount); }
        });
        document.getElementById('totalDep').innerText = total;
    });

    window.approveDep = async function(id, userId, amt) {
        if(!confirm("Approve?")) return;
        const userRef = doc(db, "users", userId);
        const userSnap = await getDoc(userRef);
        if(userSnap.exists()){
            let newBal = (parseFloat(userSnap.data().balance) || 0) + parseFloat(amt);
            await updateDoc(userRef, { balance: newBal });
            await updateDoc(doc(db, "deposits", id), { status: "Success" });
            alert("Done!");
        } else { alert("User not found!"); }
    }

    window.updateNumbers = async function() {
        const b = document.getElementById('setBkash').value;
        const n = document.getElementById('setNagad').value;
        const r = document.getElementById('setRocket').value;
        await setDoc(doc(db, "admin_settings", "numbers"), { bkash: b, nagad: n, rocket: r });
        alert("Updated!");
    }

    if(localStorage.getItem("adminLoggedIn") === "true") document.getElementById('loginOverlay').style.display = "none";
</script>
</body>
</html>
