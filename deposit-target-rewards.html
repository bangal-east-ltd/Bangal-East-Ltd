<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Deposit Rewards</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #00b894;
            --gradient: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            --bg: #f0f3f7;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); padding: 15px; }
        .container { max-width: 450px; margin: 0 auto; }

        /* Header Design */
        .header { 
            background: var(--gradient); 
            color: white; 
            padding: 30px 20px; 
            text-align: center; 
            border-radius: 20px; 
            margin-bottom: 25px; 
            position: relative;
            box-shadow: 0 10px 20px rgba(0, 184, 148, 0.2);
        }
        .header h2 { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
        .back-btn { position: absolute; left: 20px; top: 32px; color: white; font-size: 18px; }

        /* Reward Card Design */
        .reward-item { 
            background: white; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            padding: 18px; 
            border-radius: 18px; 
            margin-bottom: 15px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
            border: 1px solid #edf2f7;
        }
        .reward-icon { 
            width: 50px; height: 50px; 
            background: #e6fffb; 
            border-radius: 14px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--primary); 
            font-size: 22px; 
        }

        /* Progress Bar */
        .info-box { flex: 1; }
        .info-box h4 { font-size: 15px; color: #2d3436; font-weight: 800; margin-bottom: 4px; }
        .info-box p { font-size: 12px; color: #636e72; font-weight: 600; }
        .progress-container { 
            width: 100%; height: 10px; 
            background: #dfe6e9; 
            border-radius: 10px; 
            overflow: hidden; 
            margin-top: 10px; 
        }
        .progress-bar { 
            height: 100%; 
            background: var(--gradient); 
            width: 0%; 
            transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }

        /* Buttons */
        .claim-btn { 
            width: 90px; 
            padding: 12px 0; 
            border-radius: 12px; 
            border: none; 
            font-size: 13px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .btn-locked { background: #f1f2f6; color: #b2bec3; cursor: not-allowed; }
        .btn-ready { 
            background: var(--gradient); 
            color: white; 
            box-shadow: 0 4px 12px rgba(0, 184, 148, 0.3); 
        }
        .btn-ready:active { transform: scale(0.95); }
        .btn-done { background: #e6fffb; color: #00b894; border: 1px dashed #00b894; cursor: default; }

        /* Loader */
        .loader { text-align: center; padding: 50px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
        <h2><i class="fas fa-gem"></i> ডিপোজিট রিওয়ার্ড</h2>
        <p style="font-size: 12px; margin-top: 5px; font-weight: 600; opacity: 0.9;">আপনার টার্গেট পূরণ করুন ও বোনাস নিন</p>
    </div>

    <div id="rewardList">
        <div class="loader"><i class="fas fa-circle-notch fa-spin"></i> ডাটা লোড হচ্ছে...</div>
    </div>
</div>

<script>
    // Firebase Config (আপনারটা বসান)
    const firebaseConfig = {
        apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
        authDomain: "bengal-east-company-limited.firebaseapp.com",
        projectId: "bengal-east-company-limited",
        storageBucket: "bengal-east-company-limited.firebasestorage.app",
        messagingSenderId: "653223286483",
        appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const userPhone = localStorage.getItem("loggedUser");

    async function loadRewards() {
        if (!userPhone) {
            document.getElementById("rewardList").innerHTML = "<p style='text-align:center;'>দয়া করে লগইন করুন।</p>";
            return;
        }

        try {
            // ১. সেটিংস থেকে টার্গেট আনা
            const configDoc = await db.collection("settings").doc("deposit_config").get();
            const targets = configDoc.exists ? configDoc.data().targets : [];
            
            // ২. ইউজারের ডাটা আনা
            const userDoc = await db.collection("users").doc(userPhone).get();
            const userData = userDoc.exists ? userDoc.data() : { total_deposit: 0, claimed_deposit_rewards: [] };
            
            const totalDep = userData.total_deposit || 0;
            const claimed = userData.claimed_deposit_rewards || [];

            const listBody = document.getElementById("rewardList");
            listBody.innerHTML = "";

            if (targets.length === 0) {
                listBody.innerHTML = "<p style='text-align:center;'>বর্তমানে কোনো রিওয়ার্ড নেই।</p>";
                return;
            }

            targets.forEach(t => {
                const isClaimed = claimed.includes(t.id);
                const progress = Math.min((totalDep / t.goal) * 100, 100);
                const canClaim = totalDep >= t.goal && t.status === "active" && !isClaimed;

                listBody.innerHTML += `
                    <div class="reward-item">
                        <div class="reward-icon"><i class="fas fa-gift"></i></div>
                        <div class="info-box">
                            <h4>${t.title}</h4>
                            <p>বোনাস: <b>৳${t.bonus}</b> <span style="float:right"><b>${totalDep}</b> / ${t.goal}</span></p>
                            <div class="progress-container">
                                <div class="progress-bar" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        <div style="margin-left: 10px;">
                            ${isClaimed ? '<button class="claim-btn btn-done" disabled>সংগৃহীত</button>' : 
                              canClaim ? `<button class="claim-btn btn-ready" onclick="claim('${t.id}', ${t.bonus})">নিন</button>` :
                              `<button class="claim-btn btn-locked" disabled>${t.status === 'active' ? 'বাকি' : 'লক'}</button>`}
                        </div>
                    </div>`;
            });
        } catch (e) { 
            console.error(e); 
            document.getElementById("rewardList").innerHTML = "<p style='text-align:center; color:red;'>সার্ভার সমস্যা! আবার চেষ্টা করুন।</p>";
        }
    }

    async function claim(id, amt) {
        Swal.fire({ title: 'প্রসেসিং...', didOpen: () => { Swal.showLoading(); } });
        try {
            await db.collection("users").doc(userPhone).update({
                balance: firebase.firestore.FieldValue.increment(amt),
                claimed_deposit_rewards: firebase.firestore.FieldValue.arrayUnion(id)
            });
            Swal.fire({ icon: 'success', title: 'অভিনন্দন!', text: `আপনি ৳${amt} বোনাস পেয়েছেন।`, confirmButtonColor: '#00b894' });
            loadRewards();
        } catch (e) { 
            Swal.fire('Error', 'ক্লেইম করা সম্ভব হয়নি।', 'error'); 
        }
    }

    window.onload = loadRewards;
</script>
</body>
</html>
