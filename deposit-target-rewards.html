<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Deposit Rewards</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-green: #00d2a0;
            --bg-color: #f8fafc;
            --text-main: #2d3436;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); padding: 15px; }
        .container { max-width: 480px; margin: 0 auto; }

        /* Header Style */
        .header { 
            background: linear-gradient(135deg, #00d2a0 0%, #00b894 100%); 
            color: white; 
            padding: 35px 20px; 
            text-align: center; 
            border-radius: 25px; 
            margin-bottom: 25px; 
            position: relative;
            box-shadow: 0 10px 25px rgba(0, 210, 160, 0.2);
        }
        .header h2 { font-size: 24px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .header p { font-size: 13px; margin-top: 8px; opacity: 0.9; font-weight: 500; }
        .back-btn { position: absolute; left: 20px; top: 38px; color: white; font-size: 20px; text-decoration: none; }

        /* Reward Item Card */
        .reward-item { 
            background: white; 
            display: flex; 
            align-items: center; 
            padding: 20px; 
            border-radius: 22px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #f1f5f9;
        }
        .reward-icon { 
            width: 55px; height: 55px; 
            background: #f0fffb; 
            border-radius: 16px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--primary-green); 
            font-size: 24px; 
            margin-right: 15px;
        }

        .info-content { flex: 1; }
        .info-content h4 { font-size: 17px; color: var(--text-main); font-weight: 800; margin-bottom: 5px; }
        .info-content p { font-size: 12px; color: #636e72; font-weight: 700; margin-bottom: 8px; }
        .info-content p b { color: var(--text-main); }

        /* Progress Bar */
        .progress-box { width: 100%; height: 8px; background: #eef2f7; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-green); width: 0%; transition: 1s ease-in-out; }

        /* Claim Button Style */
        .claim-btn { 
            width: 95px; 
            padding: 12px 0; 
            border-radius: 14px; 
            border: none; 
            font-size: 14px; 
            font-weight: 800; 
            cursor: pointer; 
            margin-left: 10px;
            transition: 0.3s;
        }
        .btn-locked { background: #f1f5f9; color: #94a3b8; cursor: not-allowed; }
        .btn-ready { 
            background: var(--primary-green); 
            color: white; 
            box-shadow: 0 6px 15px rgba(0, 210, 160, 0.25); 
        }
        .btn-ready:hover { transform: translateY(-2px); }
        .btn-done { background: #e0fcf5; color: var(--primary-green); font-weight: 800; cursor: default; }

        .loader { text-align: center; padding: 50px; color: var(--primary-green); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-chevron-left"></i></a>
        <h2><i class="fas fa-wallet"></i> ডিপোজিট রিওয়ার্ড</h2>
        <p>আপনার টার্গেট পূরণ করুন ও বোনাস নিন</p>
    </div>

    <div id="rewardList">
        <div class="loader"><i class="fas fa-spinner fa-spin"></i> ডাটা লোড হচ্ছে...</div>
    </div>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
        authDomain: "bengal-east-company-limited.firebaseapp.com",
        projectId: "bengal-east-company-limited",
        storageBucket: "bengal-east-company-limited.firebasestorage.app",
        messagingSenderId: "653223286483",
        appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const userPhone = localStorage.getItem("loggedUser");

    async function loadRewards() {
        if (!userPhone) {
            document.getElementById("rewardList").innerHTML = "<p style='text-align:center; font-weight:bold;'>দয়া করে লগইন করুন।</p>";
            return;
        }

        try {
            const configDoc = await db.collection("settings").doc("deposit_config").get();
            const targets = configDoc.exists ? configDoc.data().targets : [];
            
            const userDoc = await db.collection("users").doc(userPhone).get();
            const userData = userDoc.exists ? userDoc.data() : { total_deposit: 0, claimed_deposit_rewards: [] };
            
            const totalDep = userData.total_deposit || 0;
            const claimed = userData.claimed_deposit_rewards || [];

            const listBody = document.getElementById("rewardList");
            listBody.innerHTML = "";

            targets.forEach(t => {
                const isClaimed = claimed.includes(t.id);
                const progress = Math.min((totalDep / t.goal) * 100, 100);
                const canClaim = totalDep >= t.goal && t.status === "active" && !isClaimed;

                listBody.innerHTML += `
                    <div class="reward-item">
                        <div class="reward-icon"><i class="fas fa-gift"></i></div>
                        <div class="info-content">
                            <h4>${t.title}</h4>
                            <p>বোনাস: <b>৳${t.bonus}</b> <span style="float:right"><b>${totalDep}</b> / ${t.goal}</span></p>
                            <div class="progress-box">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        <div>
                            ${isClaimed ? '<button class="claim-btn btn-done" disabled>সংগৃহীত</button>' : 
                              canClaim ? `<button class="claim-btn btn-ready" onclick="claim('${t.id}', ${t.bonus})">Claim</button>` :
                              `<button class="claim-btn btn-locked" disabled>${t.status === 'active' ? 'Claim' : 'Locked'}</button>`}
                        </div>
                    </div>`;
            });
        } catch (e) { 
            console.error(e); 
            document.getElementById("rewardList").innerHTML = "<p style='text-align:center; color:red;'>নেটওয়ার্ক সমস্যা। রিফ্রেশ দিন।</p>";
        }
    }

    async function claim(id, amt) {
        Swal.fire({ title: 'অপেক্ষা করুন...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
        try {
            await db.collection("users").doc(userPhone).update({
                balance: firebase.firestore.FieldValue.increment(amt),
                claimed_deposit_rewards: firebase.firestore.FieldValue.arrayUnion(id)
            });
            Swal.fire({ icon: 'success', title: 'সাফল্য!', text: `আপনি ৳${amt} বোনাস পেয়েছেন।`, confirmButtonColor: '#00d2a0' });
            loadRewards();
        } catch (e) { 
            Swal.fire('Error', 'ক্লেইম করা সম্ভব হয়নি।', 'error'); 
        }
    }

    window.onload = loadRewards;
</script>
</body>
</html>
