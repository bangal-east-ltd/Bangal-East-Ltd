<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - Bangal East Ltd</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #11998e; 
            --secondary: #38ef7d;
            --bg: #ffffff; 
            --card-bg: #ffffff; 
            --text-dark: #1e293b; 
            --text-light: #64748b;
            --nagad: #f7941d;
            --bkash: #e2136e;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #fdfdfd; color: var(--text-dark); padding-bottom: 110px; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: white; border-bottom: 1px solid #e2e8f0;
            position: sticky; top: 0; z-index: 1000;
        }
        .header a { color: var(--text-dark); text-decoration: none; font-size: 20px; }

        .history-btn {
            background: var(--primary); color: white !important; padding: 8px 12px;
            border-radius: 8px; font-size: 12px !important; font-weight: 700;
            display: flex; align-items: center; gap: 5px; text-decoration: none;
        }

        .container { padding: 0 20px; }
        .section-title { 
            font-size: 15px; font-weight: 700; margin: 25px 0 15px; 
            color: var(--text-dark); display: flex; align-items: center; gap: 8px; 
        }

        /* মেথড কার্ড ডিজাইন - ছবির মতো রঙিন বর্ডার */
        .methods { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .method-card {
            background: white; padding: 12px 5px; border-radius: 12px;
            text-align: center; border: 1.5px solid #eee; cursor: pointer;
            transition: 0.3s; position: relative;
        }
        .method-card img { width: 45px; height: 45px; margin-bottom: 5px; object-fit: contain; }
        .method-card p { font-size: 11px; font-weight: bold; color: var(--text-light); }
        
        /* একটিভ মেথড বর্ডার কালার */
        .method-card.active { 
            border: 2px solid var(--primary); 
            box-shadow: 0 4px 12px rgba(17, 153, 142, 0.15);
        }
        .method-card.active p { color: var(--primary); }

        /* অ্যামাউন্ট গ্রিড - ছবির মতো নিচের বর্ডার */
        .amount-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .amount-chip {
            background: white; padding: 15px; border-radius: 10px; text-align: center;
            font-weight: 700; color: var(--text-dark); 
            border: 1px solid #e2e8f0;
            border-bottom: 4px solid #11998e; /* নিচে রঙিন ডটার/বর্ডার */
            cursor: pointer; transition: 0.2s;
        }
        .amount-chip.active { 
            background: linear-gradient(to bottom, #ffffff, #e0f2f1);
            border-color: var(--primary);
            border-bottom: 4px solid #00695c;
            transform: scale(0.98);
        }

        /* ইনপুট বক্স - ছবির মতো ডিজাইন */
        .input-group { 
            background: white; padding: 15px 0; border-radius: 20px; 
            margin-top: 20px;
        }
        .input-box { margin-bottom: 20px; }
        .input-box label { display: block; font-size: 13px; color: var(--text-light); margin-bottom: 8px; font-weight: 600; }
        .input-box input {
            width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 10px;
            outline: none; font-size: 16px; background: #fcfcfc; color: var(--text-dark); 
            transition: 0.3s;
        }
        .input-box input:focus { border-color: var(--primary); background: white; }

        /* ফুটার */
        .deposit-footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: white; padding: 15px 20px; border-top: 1px solid #eee;
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 100;
        }
        .submit-btn {
            background: #d1d5db; color: white; border: none; padding: 14px 40px;
            border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s;
            font-size: 15px;
        }
        .submit-btn.active { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="account.html"><i class="fas fa-arrow-left"></i></a>
        <h3 style="font-size: 16px; font-weight: 800;">Deposit Fund</h3>
        <a href="history.html" target="_blank" class="history-btn">
            <i class="fas fa-file-invoice-dollar"></i> Deposit History
        </a>
    </div>

    <div class="container">
        <p class="section-title"><i class="fas fa-wallet" style="color: var(--primary);"></i> Select Payment Method</p>
        <div class="methods">
            <div class="method-card active" onclick="selectMethod(this, 'Nagad')">
                <img src="https://itshamsul.com/wp-content/uploads/2024/02/nagad-logo-circle.png">
                <p>Nagad</p>
            </div>
            <div class="method-card" onclick="selectMethod(this, 'bKash')">
                <img src="https://itshamsul.com/wp-content/uploads/2024/02/bkash-logo-circle.png">
                <p>bKash</p>
            </div>
            <div class="method-card" onclick="selectMethod(this, 'Rocket')">
                <img src="https://seeklogo.com/images/D/dutch-bangla-rocket-logo-B4D1CC458D-seeklogo.com.png">
                <p>Rocket</p>
            </div>
            <div class="method-card" onclick="selectMethod(this, 'USDT')">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png">
                <p>USDT</p>
            </div>
        </div>

        <p class="section-title"><i class="fas fa-th-large" style="color: var(--primary);"></i> Quick Select Amount</p>
        <div class="amount-grid">
            <div class="amount-chip" onclick="setAmount(this, 100)">৳100</div>
            <div class="amount-chip" onclick="setAmount(this, 500)">৳500</div>
            <div class="amount-chip" onclick="setAmount(this, 1000)">৳1000</div>
            <div class="amount-chip" onclick="setAmount(this, 2000)">৳2000</div>
            <div class="amount-chip" onclick="setAmount(this, 5000)">৳5000</div>
            <div class="amount-chip" onclick="setAmount(this, 10000)">৳10000</div>
        </div>

        <div class="input-group">
            <div class="input-box">
                <label>Deposit Amount (৳100 - ৳25,000)</label>
                <input type="number" id="amountInput" placeholder="100" oninput="validateForm()">
            </div>
            <div class="input-box">
                <label>Your Account Number</label>
                <input type="number" id="userNumber" placeholder="01XXXXXXXXX" oninput="validateForm()">
            </div>
        </div>
    </div>

    <div class="deposit-footer">
        <div class="recharge-info">
            <p style="font-size: 11px; color: var(--text-light); font-weight: 600;">Paying via:</p>
            <b id="selectedMethodDisplay" style="color: var(--primary); font-size: 14px;">Nagad Fast</b>
        </div>
        <button id="depositBtn" class="submit-btn" onclick="saveAndProceed()" disabled>Next Step <i class="fas fa-chevron-right" style="font-size: 12px; margin-left: 5px;"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
            authDomain: "bengal-east-company-limited.firebaseapp.com",
            projectId: "bengal-east-company-limited",
            storageBucket: "bengal-east-company-limited.firebasestorage.app",
            messagingSenderId: "653223286483",
            appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let selectedMethod = "Nagad";

        window.selectMethod = async function(el, m) {
            document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            selectedMethod = m;
            localStorage.setItem("dep_method", m);
            
            const docRef = doc(db, "admin_settings", "numbers");
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                localStorage.setItem("admin_number", data[m.toLowerCase()] || "01XXXXXXXXX");
            }
            document.getElementById('selectedMethodDisplay').innerText = m + " Fast";
        }

        window.saveAndProceed = function() {
            const amt = document.getElementById('amountInput').value;
            const userNo = document.getElementById('userNumber').value;
            const loggedUserID = localStorage.getItem("userID") || localStorage.getItem("loggedUserID") || "Unknown";

            if(amt < 100 || userNo.length < 11) {
                alert("সঠিক তথ্য দিন");
                return;
            }
            
            localStorage.setItem("dep_amt", amt);
            localStorage.setItem("dep_method", selectedMethod);
            localStorage.setItem("sender_num", userNo);
            localStorage.setItem("target_user_id", loggedUserID);
            
            window.location.href = "payment_details.html"; 
        }

        window.validateForm = function() {
            const amt = document.getElementById('amountInput').value;
            const num = document.getElementById('userNumber').value;
            const btn = document.getElementById('depositBtn');
            if(amt >= 100 && num.length >= 11) {
                btn.classList.add('active');
                btn.disabled = false;
            } else {
                btn.classList.remove('active');
                btn.disabled = true;
            }
        }

        window.setAmount = function(el, val) {
            document.querySelectorAll('.amount-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('amountInput').value = val;
            window.validateForm();
        }

        window.onload = () => {
             const nagadCard = document.querySelector('.method-card.active');
             if(nagadCard) window.selectMethod(nagadCard, 'Nagad');
        };
    </script>
</body>
</html>
