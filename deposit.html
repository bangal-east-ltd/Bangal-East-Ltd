<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - Bangal East Ltd</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #11998e; 
            --secondary: #38ef7d;
            --bg: #f8fafc; 
            --card-bg: #ffffff; 
            --text-dark: #1e293b; 
            --text-light: #64748b;
            /* নতুন কালার মিক্স */
            --orange-white-mix: linear-gradient(135deg, #fff5e6 0%, #ffffff 100%);
            --deep-green-shadow: rgba(16, 124, 65, 0.4);
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--text-dark); padding-bottom: 110px; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: white; border-bottom: 3px solid var(--primary);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: sticky; top: 0; z-index: 1000;
        }
        .header a { color: var(--text-dark); text-decoration: none; font-size: 20px; }

        .history-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white !important;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px !important;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
            text-decoration: none;
            box-shadow: 0 4px 12px rgba(17, 153, 142, 0.3);
        }

        .container { padding: 0 20px; }
        .section-title { 
            font-size: 15px; font-weight: 800; margin: 25px 0 15px; 
            color: var(--primary); display: flex; align-items: center; gap: 8px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        .methods { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .method-card {
            background: var(--card-bg); padding: 15px 5px; border-radius: 16px;
            text-align: center; border: 2px solid #e2e8f0; cursor: pointer;
            transition: 0.3s; box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
        .method-card img { width: 42px; height: 42px; margin-bottom: 8px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .method-card p { font-size: 11px; font-weight: 800; color: var(--text-light); }
        
        .method-card.active { 
            border-color: var(--primary); 
            background: #ffffff; 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px var(--deep-green-shadow);
            border-width: 3px;
        }
        .method-card.active p { color: var(--primary); }

        .amount-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .amount-chip {
            background: white; padding: 15px; border-radius: 12px; text-align: center;
            font-weight: 700; color: var(--text-dark); border: 2px solid #e2e8f0; 
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .amount-chip:hover { border-color: var(--secondary); background: #f0fdf4; }
        .amount-chip.active { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border-color: #ffffff; color: white; 
            box-shadow: 0 8px 20px var(--deep-green-shadow); 
            transform: scale(0.95);
        }

        /* আপডেট করা ইনপুট গ্রুপ - অরেঞ্জ ও সাদা মিশ্র কালার */
        .input-group { 
            background: var(--orange-white-mix); padding: 25px; border-radius: 20px; 
            margin-top: 25px; border: 2px solid #ffedda; 
            box-shadow: 0 15px 35px var(--deep-green-shadow);
        }
        .input-box { margin-bottom: 20px; }
        .input-box label { display: block; font-size: 13px; color: var(--primary); margin-bottom: 10px; font-weight: 800; }
        .input-box input {
            width: 100%; padding: 16px; border: 2px solid #f1f5f9; border-radius: 12px;
            outline: none; font-size: 18px; background: #ffffff; color: var(--text-dark); 
            transition: 0.3s; font-weight: 600;
        }
        .input-box input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 4px rgba(17, 153, 142, 0.1);
        }

        .bonus-info { 
            background: #d1fae5; color: #065f46; padding: 12px; 
            border-radius: 12px; font-size: 14px; margin-top: 10px; 
            display: none; border: 2px solid #34d399; font-weight: 700;
            text-align: center;
            box-shadow: 0 4px 10px rgba(52, 211, 153, 0.2);
        }

        .deposit-footer {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: white; padding: 20px; border-top: 2px solid #e2e8f0;
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 100; box-shadow: 0 -8px 25px rgba(0,0,0,0.1);
        }
        .submit-btn {
            background: #e2e8f0; color: #94a3b8; border: none; padding: 16px 45px;
            border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.4s;
            font-size: 16px;
        }
        .submit-btn.active { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white;
            box-shadow: 0 8px 25px var(--deep-green-shadow);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="header">
        <a href="account.html"><i class="fas fa-arrow-left"></i></a>
        <h3 style="font-size: 16px; font-weight: 900; color: var(--primary);">Deposit Fund</h3>
        <a href="history.html" target="_blank" class="history-btn">
            <i class="fas fa-file-invoice-dollar"></i> Deposit History
        </a>
    </div>

    <div class="container">
        <p class="section-title"><i class="fas fa-wallet"></i> Select Payment Method</p>
        <div class="methods">
            <div class="method-card active" onclick="selectMethod(this, 'Nagad')">
                <img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/8b/Nagad_Logo.svg/1200px-Nagad_Logo.svg.png">
                <p>Nagad</p>
            </div>
            <div class="method-card" onclick="selectMethod(this, 'bKash')">
                <img src="https://download.logo.wine/logo/BKash/BKash-Logo.wine.png">
                <p>bKash</p>
            </div>
            <div class="method-card" onclick="selectMethod(this, 'Rocket')">
                <img src="https://seeklogo.com/images/D/dutch-bangla-rocket-logo-B4D1CC458D-seeklogo.com.png">
                <p>Rocket</p>
            </div>
            <div class="method-card" onclick="selectMethod(this, 'USDT')">
                <img src="https://cryptologos.cc/logos/tether-usdt-logo.png">
                <p>USDT</p>
            </div>
        </div>

        <p class="section-title"><i class="fas fa-th-large"></i> Quick Select Amount</p>
        <div class="amount-grid">
            <div class="amount-chip" onclick="setAmount(this, 100)">৳100</div>
            <div class="amount-chip" onclick="setAmount(this, 500)">৳500</div>
            <div class="amount-chip" onclick="setAmount(this, 1000)">৳1000</div>
            <div class="amount-chip" onclick="setAmount(this, 2000)">৳2000</div>
            <div class="amount-chip" onclick="setAmount(this, 5000)">৳5000</div>
            <div class="amount-chip" onclick="setAmount(this, 10000)">৳10000</div>
        </div>

        <div class="input-group">
            <div class="input-box">
                <label>Deposit Amount (৳100 - ৳25,000)</label>
                <input type="number" id="amountInput" placeholder="Enter amount" oninput="validateForm()">
            </div>
            <div id="bonusBox" class="bonus-info">
                <i class="fas fa-gift"></i> Congratulations! Bonus: ৳<span id="bonusAmt">0</span>
            </div>
            <div class="input-box" style="margin-top: 15px;">
                <label>যে নম্বর থেকে টাকা পাঠাবে ওই নম্বর এখানে দিন</label>
                <input type="number" id="userNumber" placeholder="01XXXXXXXXX" oninput="validateForm()">
            </div>
        </div>
    </div>

    <div class="deposit-footer">
        <div class="recharge-info">
            <p style="font-size: 12px; color: var(--text-light); font-weight: 700;">Paying via:</p>
            <b id="selectedMethodDisplay" style="color: var(--primary); font-size: 14px;">Nagad Fast</b>
        </div>
        <button id="depositBtn" class="submit-btn" onclick="saveAndProceed()" disabled>Next Step <i class="fas fa-chevron-right" style="font-size: 12px; margin-left: 5px;"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
            authDomain: "bengal-east-company-limited.firebaseapp.com",
            projectId: "bengal-east-company-limited",
            storageBucket: "bengal-east-company-limited.firebasestorage.app",
            messagingSenderId: "653223286483",
            appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let selectedMethod = "Nagad";

        window.selectMethod = async function(el, m) {
            document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            selectedMethod = m;
            localStorage.setItem("dep_method", m);
            
            const docRef = doc(db, "admin_settings", "numbers");
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                localStorage.setItem("admin_number", data[m.toLowerCase()] || "01XXXXXXXXX");
            }
            document.getElementById('selectedMethodDisplay').innerText = m + " Fast";
        }

        window.saveAndProceed = function() {
            const amt = document.getElementById('amountInput').value;
            const userNo = document.getElementById('userNumber').value;
            const loggedUserID = localStorage.getItem("userID") || localStorage.getItem("loggedUserID") || "Unknown";

            if(amt < 100 || userNo.length < 11) {
                alert("সঠিক তথ্য দিন");
                return;
            }
            
            localStorage.setItem("dep_amt", amt);
            localStorage.setItem("dep_method", selectedMethod);
            localStorage.setItem("sender_num", userNo);
            localStorage.setItem("target_user_id", loggedUserID);
            
            window.location.href = "payment_details.html"; 
        }

        window.validateForm = function() {
            const amt = document.getElementById('amountInput').value;
            const num = document.getElementById('userNumber').value;
            const btn = document.getElementById('depositBtn');
            if(amt >= 100 && num.length >= 11) {
                btn.classList.add('active');
                btn.disabled = false;
            } else {
                btn.classList.remove('active');
                btn.disabled = true;
            }
        }

        window.setAmount = function(el, val) {
            document.querySelectorAll('.amount-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('amountInput').value = val;
            window.validateForm();
        }

        window.onload = () => {
             const nagadCard = document.querySelector('.method-card.active');
             if(nagadCard) window.selectMethod(nagadCard, 'Nagad');
        };
    </script>
</body>
</html>
