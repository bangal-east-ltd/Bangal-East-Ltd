<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Rewards - Bengal East</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #11998e; --grad: linear-gradient(135deg, #11998e, #38ef7d); }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .header { background: var(--grad); color: white; padding: 20px; text-align: center; border-radius: 15px; margin-bottom: 20px; }
        .reward-card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #11998e; }
        .reward-info h3 { margin: 0; font-size: 16px; color: #333; }
        .reward-info p { margin: 5px 0 0; font-size: 18px; font-weight: bold; color: var(--primary); }
        .claim-btn { background: var(--grad); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .claim-btn:disabled { background: #ccc; cursor: not-allowed; }
        .claim-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="header">
        <h2><i class="fas fa-hand-holding-usd"></i> Main Rewards</h2>
        <p id="totalBalance">ব্যালেন্স: ৳ 0.00</p>
    </div>

    <div class="reward-card">
        <div class="reward-info">
            <h3>Refer Bonus</h3>
            <p id="refer_income">৳ 0.00</p>
        </div>
        <button class="claim-btn" onclick="claimReward('refer_income')">Claim</button>
    </div>

    <div class="reward-card">
        <div class="reward-info">
            <h3>Level Income</h3>
            <p id="level_income">৳ 0.00</p>
        </div>
        <button class="claim-btn" onclick="claimReward('level_income')">Claim</button>
    </div>

    <div class="reward-card">
        <div class="reward-info">
            <h3>Daily ROI Income</h3>
            <p id="daily_roi">৳ 0.00</p>
        </div>
        <button class="claim-btn" onclick="claimReward('daily_roi')">Claim</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
        // Firebase কনফিগারেশন আপনার আগের কোড থেকে দিন
        const firebaseConfig = {
            apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
            authDomain: "bengal-east-company-limited.firebaseapp.com",
            projectId: "bengal-east-company-limited",
            storageBucket: "bengal-east-company-limited.firebasestorage.app",
            messagingSenderId: "653223286483",
            appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const loggedUser = localStorage.getItem("loggedUser");

        function loadRewards() {
            if(!loggedUser) return;
            db.collection("users").doc(loggedUser).onSnapshot(doc => {
                if(doc.exists) {
                    const data = doc.data();
                    document.getElementById('totalBalance').innerText = "ব্যালেন্স: ৳ " + (data.balance || 0).toFixed(2);
                    document.getElementById('refer_income').innerText = "৳ " + (data.refer_income || 0).toFixed(2);
                    document.getElementById('level_income').innerText = "৳ " + (data.level_income || 0).toFixed(2);
                    document.getElementById('daily_roi').innerText = "৳ " + (data.daily_roi || 0).toFixed(2);
                }
            });
        }

        async function claimReward(field) {
            const userRef = db.collection("users").doc(loggedUser);
            const snap = await userRef.get();
            const amount = parseFloat(snap.data()[field] || 0);

            if(amount > 0) {
                try {
                    await userRef.update({
                        balance: firebase.firestore.FieldValue.increment(amount),
                        [field]: 0
                    });
                    alert("Claim Successful!");
                } catch(e) { alert("Error claiming reward"); }
            } else {
                alert("No amount to claim!");
            }
        }

        loadRewards();
    </script>
</body>
</html>
