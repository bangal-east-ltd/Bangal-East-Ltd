<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotion Center - Bengal East Ltd</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; color: #333; padding-bottom: 30px; }
        .header { background: #11998e; color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .reward-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .income-card { background: white; padding: 15px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 4px solid #11998e; }
        .income-card h4 { font-size: 11px; color: #666; margin-bottom: 5px; }
        .income-card h2 { font-size: 16px; color: #11998e; margin-bottom: 10px; }
        .claim-btn { background: #11998e; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .claim-btn:active { transform: scale(0.95); }
        .refer-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        .refer-link-box { display: flex; background: #f8f9fa; border: 1.5px dashed #11998e; padding: 12px; border-radius: 10px; justify-content: space-between; align-items: center; gap: 10px; margin-top: 10px; }
        .refer-link-box span { font-weight: bold; color: #11998e; font-size: 11px; word-break: break-all; text-align: left; }
        .copy-btn { background: #11998e; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-item { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.03); border-left: 5px solid #11998e; }
        .team-section { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .level-tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; }
        .level-btn { padding: 8px 18px; background: #f0f0f0; border-radius: 20px; font-size: 12px; cursor: pointer; border: none; font-weight: 600; }
        .level-btn.active { background: #11998e; color: white; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; outline: none; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 5px; font-size: 11px; border-bottom: 1px solid #f4f7f6; text-align: center; }
        .status-badge { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .active-user { background: #e8f5e9; color: #2e7d32; }
        .inactive-user { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>

    <div class="header">
        <h2><i class="fas fa-bullhorn"></i> Promotion Center</h2>
    </div>

    <div class="container">
        <div class="reward-container">
            <div class="income-card">
                <h4>টিম লেভেল ইনকাম</h4>
                <h2 id="levelIncomeDisplay">৳ 0.00</h2>
                <button class="claim-btn" onclick="claimMoney('level_income')">Claim</button>
            </div>
            <div class="income-card">
                <h4>ROI ইনকাম</h4>
                <h2 id="roiIncomeDisplay">৳ 0.00</h2>
                <button class="claim-btn" onclick="claimMoney('daily_roi')">Claim</button>
            </div>
        </div>

        <div class="refer-card">
            <h4>আপনার রেফারেল লিঙ্ক</h4>
            <div class="refer-link-box">
                <span id="displayLink">লিঙ্ক তৈরি হচ্ছে...</span>
                <button class="copy-btn" onclick="copyLink()"><i class="fas fa-copy"></i> কপি</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <p style="font-size: 11px; color: #888;">মোট টিম / টিম ROI</p>
                <h3 id="totalTeam">0 / ৳ 0</h3>
            </div>
            <div class="stat-item">
                <p style="font-size: 11px; color: #888;">টিম প্যাকেজ ভ্যালু</p>
                <h3 id="teamDeposit" style="color: #11998e;">৳ 0.00</h3>
            </div>
            <div class="stat-item">
                <p style="font-size: 11px; color: #888;">এক্টিভ মেম্বার</p>
                <h3 id="activeToday">0</h3>
            </div>
            <div class="stat-item">
                <p style="font-size: 11px; color: #888;">আপনার ব্যালেন্স</p>
                <h3 id="myBalanceDisplay" style="color: #28a745;">৳ 0.00</h3>
            </div>
        </div>

        <div class="team-section">
            <h3>টিম রিপোর্ট</h3>
            <input type="text" id="memberSearch" class="search-box" placeholder="ইউজার আইডি দিয়ে খুঁজুন..." onkeyup="searchMember()">
            
            <div class="level-tabs">
                <button class="level-btn active" onclick="filterTeam(1, this)">Level 1</button>
                <button class="level-btn" onclick="filterTeam(2, this)">Level 2</button>
                <button class="level-btn" onclick="filterTeam(3, this)">Level 3</button>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>আইডি</th>
                        <th>প্যাকেজ</th>
                        <th>আপনার ROI</th>
                        <th>স্ট্যাটাস</th>
                    </tr>
                </thead>
                <tbody id="teamBody">
                    <tr><td colspan="4" style="text-align:center; padding: 20px;">লোড হচ্ছে...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
        authDomain: "bengal-east-company-limited.firebaseapp.com",
        projectId: "bengal-east-company-limited",
        storageBucket: "bengal-east-company-limited.firebasestorage.app",
        messagingSenderId: "653223286483",
        appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const userPhone = localStorage.getItem("loggedUser"); 
    let allTeamData = [];
    let currentLevel = 1;

    async function loadPromotionData() {
        if(!userPhone) { window.location.href="login.html"; return; }
        try {
            const userSnap = await db.collection("users").doc(userPhone).get();
            if (userSnap.exists) {
                const userData = userSnap.data();
                document.getElementById('myBalanceDisplay').innerText = "৳ " + (parseFloat(userData.balance) || 0).toFixed(2);
                document.getElementById('levelIncomeDisplay').innerText = "৳ " + (parseFloat(userData.level_income) || 0).toFixed(2);
                document.getElementById('roiIncomeDisplay').innerText = "৳ " + (parseFloat(userData.daily_roi) || 0).toFixed(2);
                const baseURL = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, "");
                document.getElementById('displayLink').innerText = baseURL + "/index.html?ref=" + userData.userID;
                fetchTeam(userData.userID);
            }
        } catch (e) { console.error(e); }
    }

    async function fetchTeam(myUID) {
        allTeamData = [];
        let totalActiveDeposit = 0; 
        let activeCount = 0;
        let totalRoiCalc = 0; 

        let L1_Rate = 0.10, L2_Rate = 0.05, L3_Rate = 0.02;
        try {
            const adminSnap = await db.collection("settings").doc("commission_rates").get();
            if(adminSnap.exists) {
                const rates = adminSnap.data();
                L1_Rate = parseFloat(rates.level1 || 10) / 100;
                L2_Rate = parseFloat(rates.level2 || 5) / 100;
                L3_Rate = parseFloat(rates.level3 || 2) / 100;
            }
        } catch(err) { console.log("Default rates used."); }

        const snapshot = await db.collection("users").get();
        const users = snapshot.docs.map(doc => doc.data());

        function findReferrals(parentID, level) {
            if (level > 3) return;
            const refs = users.filter(u => String(u.referrerID) === String(parentID));
            
            refs.forEach(u => {
                const deposit = parseFloat(u.totalDeposit || 0);
                const balance = parseFloat(u.balance || 0);
                const userStatus = String(u.status || "").toLowerCase();
                const pkg = u["Vip package"] || "";
                const hasPackage = (pkg && pkg !== "");
                const isActive = (userStatus === "active") || (deposit > 0) || (hasPackage) || (balance >= 100);
                
                if(isActive) activeCount++;
                totalActiveDeposit += deposit;

                let packageValue = deposit; 
                if (packageValue === 0 && hasPackage) {
                    const priceMatch = pkg.match(/\d+/); 
                    if (priceMatch) packageValue = parseFloat(priceMatch[0]);
                }

                let commission = 0;
                if(level === 1) commission = packageValue * L1_Rate;
                else if(level === 2) commission = packageValue * L2_Rate;
                else if(level === 3) commission = packageValue * L3_Rate;

                totalRoiCalc += commission;

                allTeamData.push({
                    id: u.userID,
                    package: hasPackage ? pkg : (deposit > 0 ? "৳"+deposit : "VIP User"),
                    roi: commission,
                    status: isActive ? 'Active' : 'Inactive',
                    level: level
                });
                findReferrals(u.userID, level + 1);
            });
        }

        findReferrals(myUID, 1);
        document.getElementById('totalTeam').innerText = `${allTeamData.length} / ৳ ${totalRoiCalc.toFixed(2)}`;
        document.getElementById('teamDeposit').innerText = "৳ " + totalActiveDeposit.toFixed(2);
        document.getElementById('activeToday').innerText = activeCount;
        filterTeam(1);
    }

    // --- ক্লেইম করার আপডেট ফাংশন (উভয় ইনকামের জন্য আলাদা তারিখ চেক ও SweetAlert2) ---
    async function claimMoney(field) {
        const userRef = db.collection("users").doc(userPhone);
        const today = new Date().toLocaleDateString('en-GB'); 
        
        // ফিল্ড অনুযায়ী আলাদা আলাদা ট্র্যাকিং Key তৈরি করা
        const claimDateField = field === 'level_income' ? 'last_claim_date_level' : 'last_claim_date_roi';

        try {
            const doc = await userRef.get();
            const userData = doc.data();
            const lastClaimDate = userData[claimDateField] || ""; 
            const amount = parseFloat(userData[field] || 0);

            // ১. ব্যালেন্স চেক
            if (amount <= 0) {
                Swal.fire({ icon: 'error', title: 'দুঃখিত', text: 'আপনার ক্লেইম করার মতো কোনো ব্যালেন্স নেই!', confirmButtonColor: '#11998e' });
                return;
            }

            // ২. তারিখ চেক
            if (lastClaimDate === today) {
                Swal.fire({ 
                    icon: 'warning', 
                    title: 'সীমাবদ্ধতা', 
                    text: `আপনি আজ ইতিমধ্যে আপনার ${field === 'level_income' ? 'টিম ইনকাম' : 'ROI ইনকাম'} ক্লেইম করেছেন। আগামীকাল আবার পারবেন।`, 
                    confirmButtonColor: '#11998e' 
                });
                return;
            }

            // ৩. কনফার্মেশন পপ-আপ
            const result = await Swal.fire({
                title: 'ব্যালেন্স ক্লেইম',
                text: `আপনি কি ৳${amount.toFixed(2)} টাকা মেইন ব্যালেন্সে নিতে চান?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#11998e',
                cancelButtonColor: '#d33',
                confirmButtonText: 'হ্যাঁ, নিন',
                cancelButtonText: 'বাতিল'
            });

            if (result.isConfirmed) {
                // ৪. ব্যালেন্স আপডেট এবং ফিল্ড অনুযায়ী তারিখ সেভ
                await userRef.update({
                    balance: firebase.firestore.FieldValue.increment(amount),
                    [field]: 0,
                    [claimDateField]: today 
                });

                Swal.fire({ icon: 'success', title: 'সফল', text: 'ব্যালেন্সটি সফলভাবে যোগ হয়েছে!', showConfirmButton: false, timer: 2000 });
                loadPromotionData(); 
            }

        } catch (e) {
            console.error(e);
            Swal.fire({ icon: 'error', title: 'ভুল', text: 'ক্লেইম করতে সমস্যা হয়েছে।', confirmButtonColor: '#11998e' });
        }
    }

    function filterTeam(level, btn) {
        currentLevel = level;
        if(btn) {
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        renderTable(allTeamData.filter(x => x.level === level));
    }

    function renderTable(data) {
        const body = document.getElementById('teamBody');
        if(data.length === 0) {
            body.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 20px;">মেম্বার নেই</td></tr>`;
            return;
        }
        body.innerHTML = data.map(u => `
            <tr>
                <td><b>${u.id}</b></td>
                <td>${u.package}</td>
                <td style="color:#11998e; font-weight:bold;">৳${u.roi.toFixed(2)}</td>
                <td><span class="status-badge ${u.status === 'Active' ? 'active-user' : 'inactive-user'}">${u.status}</span></td>
            </tr>
        `).join('');
    }

    function searchMember() {
        const val = document.getElementById('memberSearch').value.toLowerCase();
        renderTable(allTeamData.filter(u => u.level === currentLevel && String(u.id).includes(val)));
    }

    window.copyLink = function() {
        const link = document.getElementById('displayLink').innerText;
        navigator.clipboard.writeText(link).then(() => {
            Swal.fire({ icon: 'success', title: 'কপি হয়েছে!', text: 'রেফারেল লিঙ্ক ক্লিপবোর্ডে কপি করা হয়েছে।', timer: 1500, showConfirmButton: false });
        });
    }

    loadPromotionData();
</script>
</body>
</html>
