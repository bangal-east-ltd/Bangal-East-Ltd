<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotion Center - Bengal East Ltd</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <style>
        /* আপনার দেওয়া সুন্দর ডিজাইনটি এখানে রাখা হয়েছে */
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; color: #333; padding-bottom: 30px; }
        .header { background: #11998e; color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .refer-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        .refer-link-box { display: flex; background: #f8f9fa; border: 1.5px dashed #11998e; padding: 12px; border-radius: 10px; justify-content: space-between; align-items: center; gap: 10px; margin-top: 10px; }
        .refer-link-box span { font-weight: bold; color: #11998e; font-size: 12px; word-break: break-all; text-align: left; }
        .copy-btn { background: #11998e; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-item { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.03); border-left: 5px solid #11998e; }
        .team-section { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .level-tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; }
        .level-btn { padding: 8px 18px; background: #f0f0f0; border-radius: 20px; font-size: 12px; cursor: pointer; border: none; font-weight: 600; }
        .level-btn.active { background: #11998e; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 5px; font-size: 13px; border-bottom: 1px solid #f4f7f6; text-align: left; }
        .level-tag { font-size: 10px; background: #e8f5e9; padding: 2px 6px; border-radius: 5px; color: #2e7d32; font-weight: bold; }
        #toast { visibility: hidden; min-width: 200px; background: #333; color: #fff; text-align: center; border-radius: 8px; padding: 12px; position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div id="toast">লিঙ্ক কপি হয়েছে!</div>

    <div class="header">
        <h2><i class="fas fa-bullhorn"></i> Promotion Center</h2>
    </div>

    <div class="container">
        <div class="refer-card">
            <h4>আপনার রেফারেল লিঙ্ক</h4>
            <div class="refer-link-box">
                <span id="displayLink">লিঙ্ক তৈরি হচ্ছে...</span>
                <button class="copy-btn" onclick="copyLink()"><i class="fas fa-copy"></i> কপি</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <p style="font-size: 11px; color: #888;">মোট টিম</p>
                <h3 id="totalTeam">0 Members</h3>
            </div>
            <div class="stat-item">
                <p style="font-size: 11px; color: #888;">মোট কমিশন</p>
                <h3 id="totalComm" style="color: #28a745;">৳ 0.00</h3>
            </div>
        </div>

        <div class="team-section">
            <h3>টিম রিপোর্ট</h3>
            <div class="level-tabs">
                <button class="level-btn active" onclick="filterTeam(1, this)">Level 1</button>
                <button class="level-btn" onclick="filterTeam(2, this)">Level 2</button>
                <button class="level-btn" onclick="filterTeam(3, this)">Level 3</button>
            </div>
            <table>
                <thead>
                    <tr><th>নাম</th><th>ইউজার আইডি</th><th>ডিপোজিট</th></tr>
                </thead>
                <tbody id="teamBody">
                    <tr><td colspan="3" style="text-align:center; padding: 20px;">লোড হচ্ছে...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

<script>
    // আপনার এডমিন প্যানেলের Firebase কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
        authDomain: "bengal-east-company-limited.firebaseapp.com",
        projectId: "bengal-east-company-limited",
        storageBucket: "bengal-east-company-limited.firebasestorage.app",
        messagingSenderId: "653223286483",
        appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const userPhone = localStorage.getItem("userPhone");
    let allTeamData = [];

    async function loadPromotionData() {
        if(!userPhone) { window.location.href="login.html"; return; }

        try {
            // ১. ইউজারের ৫ সংখ্যার আইডি (userID) ডাটাবেস থেকে নেওয়া
            const userSnap = await db.collection("users").doc(userPhone).get();
            if (userSnap.exists) {
                const userData = userSnap.data();
                const myUID = userData.userID; // এটি সেই ৫ সংখ্যার আইডি

                // ২. রেফার লিঙ্ক তৈরি (সরাসরি index.html এর জন্য)
                const baseURL = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, "");
                const finalLink = baseURL + "/index.html?ref=" + myUID;
                document.getElementById('displayLink').innerText = finalLink;
                document.getElementById('totalComm').innerText = "৳ " + (userData.refCommission || 0);

                // ৩. ৩ লেভেল টিম ডাটা লোড লজিক
                fetchTeam(myUID);
            }
        } catch (e) { console.error(e); }
    }

    async function fetchTeam(myUID) {
        allTeamData = [];
        let count = 0;

        // Level 1
        const q1 = await db.collection("users").where("referrerID", "==", String(myUID)).get();
        for (let d1 of q1.docs) {
            const u1 = d1.data();
            count++;
            allTeamData.push({ name: u1.name || 'User', id: u1.userID, dep: u1.totalDeposit || 0, level: 1 });

            // Level 2
            const q2 = await db.collection("users").where("referrerID", "==", String(u1.userID)).get();
            for (let d2 of q2.docs) {
                const u2 = d2.data();
                count++;
                allTeamData.push({ name: u2.name || 'User', id: u2.userID, dep: u2.totalDeposit || 0, level: 2 });

                // Level 3
                const q3 = await db.collection("users").where("referrerID", "==", String(u2.userID)).get();
                for (let d3 of q3.docs) {
                    const u3 = d3.data();
                    count++;
                    allTeamData.push({ name: u3.name || 'User', id: u3.userID, dep: u3.totalDeposit || 0, level: 3 });
                }
            }
        }
        document.getElementById('totalTeam').innerText = count + " Members";
        filterTeam(1); // ডিফল্ট Level 1 দেখাবে
    }

    function filterTeam(level, btn) {
        if(btn) {
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        const body = document.getElementById('teamBody');
        const data = allTeamData.filter(x => x.level === level);

        if(data.length === 0) {
            body.innerHTML = `<tr><td colspan="3" style="text-align:center; padding:20px;">এই লেভেলে কেউ নেই</td></tr>`;
            return;
        }

        body.innerHTML = data.map(u => `
            <tr>
                <td>${u.name} <span class="level-tag">L${u.level}</span></td>
                <td><b>${u.id}</b></td>
                <td style="color:#28a745;">৳${u.dep}</td>
            </tr>
        `).join('');
    }

    window.copyLink = function() {
        const link = document.getElementById('displayLink').innerText;
        navigator.clipboard.writeText(link).then(() => {
            const t = document.getElementById('toast');
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 3000);
        });
    }

    loadPromotionData();
</script>
</body>
</html>
