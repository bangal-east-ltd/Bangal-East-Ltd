<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotion Center - Bengal East Ltd</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; color: #333; padding-bottom: 30px; }
        .header { background: #11998e; color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 100; }
        .header h2 { font-size: 20px; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        /* Referral Card */
        .refer-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        .refer-card h4 { font-size: 14px; color: #666; margin-bottom: 12px; }
        .refer-link-box { display: flex; background: #f8f9fa; border: 1.5px dashed #11998e; padding: 12px; border-radius: 10px; justify-content: space-between; align-items: center; gap: 10px; }
        .refer-link-box span { font-weight: bold; color: #11998e; font-size: 11px; word-break: break-all; text-align: left; }
        .copy-btn { background: #11998e; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; white-space: nowrap; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-item { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.03); border-left: 5px solid #11998e; }
        .stat-item p { font-size: 11px; color: #888; font-weight: 600; }
        .stat-item h3 { font-size: 15px; color: #333; margin-top: 5px; }

        /* Team Section */
        .team-section { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .team-section h3 { font-size: 16px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; color: #11998e; }
        .level-tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; }
        .level-btn { padding: 8px 18px; background: #f0f0f0; border-radius: 20px; font-size: 12px; cursor: pointer; border: none; font-weight: 600; }
        .level-btn.active { background: #11998e; color: white; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 11px; color: #999; padding: 10px 5px; border-bottom: 2px solid #f4f7f6; }
        td { padding: 12px 5px; font-size: 13px; border-bottom: 1px solid #f4f7f6; }
        .user-id { font-weight: bold; color: #444; }
        .level-tag { font-size: 10px; background: #e8f5e9; padding: 2px 6px; border-radius: 5px; color: #2e7d32; font-weight: bold; }

        #toast {
            visibility: hidden; min-width: 200px; background-color: #333; color: #fff;
            text-align: center; border-radius: 8px; padding: 12px; position: fixed;
            z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 14px;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div id="toast">Link Copied!</div>

    <div class="header">
        <h2><i class="fas fa-bullhorn"></i> Promotion Center</h2>
    </div>

    <div class="container">
        <div class="refer-card">
            <h4>Your Referral Link</h4>
            <div class="refer-link-box">
                <span id="referLink">Loading Link...</span>
                <button class="copy-btn" onclick="copyLink()"><i class="fas fa-copy"></i> Copy</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <p>Total Team</p>
                <h3 id="totalRef">0 Members</h3>
            </div>
            <div class="stat-item">
                <p>Total Commission</p>
                <h3 id="totalComm" style="color: #28a745;">৳ 0.00</h3>
            </div>
        </div>

        <div class="team-section">
            <h3>Team Breakdown (3 Levels)</h3>
            <div class="level-tabs">
                <button class="level-btn active" onclick="changeLevel(1, this)">Level 1</button>
                <button class="level-btn" onclick="changeLevel(2, this)">Level 2</button>
                <button class="level-btn" onclick="changeLevel(3, this)">Level 3</button>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>User & Level</th>
                        <th>User ID</th>
                        <th>Deposit</th>
                    </tr>
                </thead>
                <tbody id="teamBody">
                    <tr><td colspan="3" style="text-align:center; padding: 20px; color: #999;">Loading Team...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

<script>
    // ১. Firebase কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyAoZ39EQR-Buy6QJT71P2R4wL0RyiOQaAc",
        databaseURL: "https://ai-signal-75e73-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const userPhone = localStorage.getItem("userPhone");
    let fullTeamData = []; // সব লেভেলের ডাটা এখানে থাকবে

    if(!userPhone) {
        window.location.href = "login.html";
    }

    // ২. লিঙ্ক এবং আইডি ইনিশিয়ালাইজেশন
    function initPromotion() {
        // ৫ সংখ্যার ইউজার আইডি ডাটাবেস থেকে নেওয়া
        db.collection("users").doc(userPhone).get().then((doc) => {
            if (doc.exists) {
                const myId = doc.data().userID; 
                
                // আপনার ডোমেইন অনুযায়ী লিঙ্ক তৈরি
                const baseURL = "https://bangal-east-ltd.github.io/Bangal-East-Ltd/index.html";
                const fullLink = baseURL + "?ref=" + myId; 
                document.getElementById('referLink').innerText = fullLink;

                // কমিশন রিয়েলটাইম লোড করা
                document.getElementById('totalComm').innerText = "৳ " + (doc.data().refCommission || 0);

                // টিম ডাটা লোড করা শুরু (৩ লেভেল লজিক)
                loadThreeLevelTeam(myId);
            }
        });
    }

    // ৩. ৩ লেভেল টিম ডাটা লোড করার লজিক
    async function loadThreeLevelTeam(myId) {
        let totalCount = 0;
        fullTeamData = [];

        try {
            // লেভেল ১
            const s1 = await db.collection("users").where("referrerID", "==", String(myId)).get();
            
            for (let doc1 of s1.docs) {
                const u1 = doc1.data();
                const id1 = u1.userID;
                totalCount++;
                fullTeamData.push({ name: u1.name || 'User', id: id1, dep: u1.totalDeposit || 0, level: 1 });

                // লেভেল ২
                const s2 = await db.collection("users").where("referrerID", "==", String(id1)).get();
                for (let doc2 of s2.docs) {
                    const u2 = doc2.data();
                    const id2 = u2.userID;
                    totalCount++;
                    fullTeamData.push({ name: u2.name || 'User', id: id2, dep: u2.totalDeposit || 0, level: 2 });

                    // লেভেল ৩
                    const s3 = await db.collection("users").where("referrerID", "==", String(id2)).get();
                    for (let doc3 of s3.docs) {
                        const u3 = doc3.data();
                        totalCount++;
                        fullTeamData.push({ name: u3.name || 'User', id: u3.userID, dep: u3.totalDeposit || 0, level: 3 });
                    }
                }
            }

            document.getElementById('totalRef').innerText = totalCount + " Members";
            renderTable(1); // ডিফল্টভাবে লেভেল ১ দেখাবে

        } catch (error) {
            console.error("Error loading team:", error);
            document.getElementById('teamBody').innerHTML = "<tr><td colspan='3' style='text-align:center; color:red;'>Failed to load team data.</td></tr>";
        }
    }

    // ৪. টেবিল রেন্ডার করা (লেভেল অনুযায়ী ফিল্টার)
    function renderTable(level) {
        const listBody = document.getElementById("teamBody");
        const filteredList = fullTeamData.filter(item => item.level === level);

        if (filteredList.length === 0) {
            listBody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding: 20px;">No Level ${level} members.</td></tr>`;
            return;
        }

        let html = "";
        filteredList.forEach(item => {
            html += `<tr>
                <td class="user-id">${item.name} <span class="level-tag">L1</span></td>
                <td>ID: ${item.id}</td>
                <td style="color:#28a745; font-weight:bold;">৳ ${item.dep}</td>
            </tr>`;
        });
        listBody.innerHTML = html;
    }

    // ৫. লেভেল ট্যাব পরিবর্তন
    window.changeLevel = function(level, btn) {
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTable(level);
    }

    // ৬. লিঙ্ক কপি ফাংশন
    window.copyLink = function() {
        const linkText = document.getElementById("referLink").innerText;
        navigator.clipboard.writeText(linkText).then(() => {
            var x = document.getElementById("toast");
            x.className = "show";
            setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
        });
    }

    // পেজ লোড হলে শুরু হবে
    initPromotion();
</script>

</body>
</html>
