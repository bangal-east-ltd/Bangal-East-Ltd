<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotion Center - Bengal East Ltd</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; color: #333; padding-bottom: 30px; }
        .header { background: #11998e; color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 100; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .refer-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        .refer-link-box { display: flex; background: #f8f9fa; border: 1.5px dashed #11998e; padding: 12px; border-radius: 10px; justify-content: space-between; align-items: center; gap: 10px; margin-top: 10px; }
        .refer-link-box span { font-weight: bold; color: #11998e; font-size: 12px; word-break: break-all; text-align: left; }
        .copy-btn { background: #11998e; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-item { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.03); border-left: 5px solid #11998e; }
        
        .team-section { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .level-tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; }
        .level-btn { padding: 8px 18px; background: #f0f0f0; border-radius: 20px; font-size: 12px; cursor: pointer; border: none; font-weight: 600; }
        .level-btn.active { background: #11998e; color: white; }
        
        .search-box { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; outline: none; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 5px; font-size: 12px; border-bottom: 1px solid #f4f7f6; text-align: center; }
        .status-badge { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .active-user { background: #e8f5e9; color: #2e7d32; }
        .inactive-user { background: #ffebee; color: #c62828; }

        #toast { visibility: hidden; min-width: 200px; background: #333; color: #fff; text-align: center; border-radius: 8px; padding: 12px; position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        
        .rewards-link { display: block; background: #2575fc; color: white; text-decoration: none; padding: 12px; text-align: center; border-radius: 10px; margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div id="toast">লিঙ্ক কপি হয়েছে!</div>

    <div class="header">
        <h2><i class="fas fa-bullhorn"></i> Promotion Center</h2>
    </div>

    <div class="container">
        <a href="main_rewards.html" class="rewards-link">
            <i class="fas fa-gift"></i> ইনকাম ক্লেইম করুন (Main Rewards)
        </a>

        <div class="refer-card" style="margin-top: 20px;">
            <h4>আপনার রেফারেল লিঙ্ক</h4>
            <div class="refer-link-box">
                <span id="displayLink">লিঙ্ক তৈরি হচ্ছে...</span>
                <button class="copy-btn" onclick="copyLink()"><i class="fas fa-copy"></i> কপি</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <p style="font-size: 11px; color: #888;">মোট টিম / কমিশন</p>
                <h3 id="totalTeam">0 / ৳ 0</h3>
            </div>
            <div class="stat-item">
                <p style="font-size: 11px; color: #888;">টিম ডিপোজিট</p>
                <h3 id="teamDeposit" style="color: #11998e;">৳ 0.00</h3>
            </div>
            <div class="stat-item">
                <p style="font-size: 11px; color: #888;">আজকের এক্টিভ মেম্বার</p>
                <h3 id="activeToday">0</h3>
            </div>
            <div class="stat-item">
                <p style="font-size: 11px; color: #888;">আপনার ব্যালেন্স</p>
                <h3 id="myBalanceDisplay" style="color: #28a745;">৳ 0.00</h3>
            </div>
        </div>

        <div class="team-section">
            <h3>টিম রিপোর্ট</h3>
            <input type="text" id="memberSearch" class="search-box" placeholder="ইউজার আইডি দিয়ে খুঁজুন..." onkeyup="searchMember()">
            
            <div class="level-tabs">
                <button class="level-btn active" onclick="filterTeam(1, this)">Level 1</button>
                <button class="level-btn" onclick="filterTeam(2, this)">Level 2</button>
                <button class="level-btn" onclick="filterTeam(3, this)">Level 3</button>
            </div>
            <table>
                <thead>
                    <tr><th>আইডি</th><th>ডিপোজিট</th><th>স্ট্যাটাস</th></tr>
                </thead>
                <tbody id="teamBody">
                    <tr><td colspan="3" style="text-align:center; padding: 20px;">লোড হচ্ছে...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
        authDomain: "bengal-east-company-limited.firebaseapp.com",
        projectId: "bengal-east-company-limited",
        storageBucket: "bengal-east-company-limited.firebasestorage.app",
        messagingSenderId: "653223286483",
        appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const loggedUser = localStorage.getItem("loggedUser");
    let allTeamData = [];
    let currentLevel = 1;

    async function loadPromotionData() {
        if(!loggedUser) { window.location.href="login.html"; return; }

        try {
            db.collection("users").doc(loggedUser).onSnapshot((doc) => {
                if (doc.exists) {
                    const userData = doc.data();
                    const myUID = userData.userID;
                    
                    // মূল ব্যালেন্স আপডেট
                    document.getElementById('myBalanceDisplay').innerText = "৳ " + (parseFloat(userData.balance) || 0).toFixed(2);

                    // রেফার লিঙ্ক তৈরি
                    const baseURL = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, "");
                    document.getElementById('displayLink').innerText = baseURL + "/index.html?ref=" + myUID;
                    
                    // টিম ডাটা ফেচ
                    fetchTeam(myUID);
                }
            });
        } catch (e) { console.error(e); }
    }

    async function fetchTeam(myUID) {
        try {
            const snapshot = await db.collection("users").get();
            const users = snapshot.docs.map(doc => doc.data());
            
            allTeamData = [];
            let totalTeamDep = 0;
            let activeCount = 0;
            let totalComm = 0;

            function findReferrals(parentID, level) {
                if (level > 3) return;
                const refs = users.filter(u => String(u.referrerID) === String(parentID));
                
                refs.forEach(u => {
                    const currentBal = parseFloat(u.balance || 0); 
                    const dep = parseFloat(u.total_deposit || 0);
                    
                    // মেম্বার ব্যালেন্স ১০০ বা তার বেশি হলে Active
                    const isActive = currentBal >= 100; 
                    
                    if(isActive) activeCount++;
                    totalTeamDep += dep;

                    allTeamData.push({
                        id: u.userID,
                        dep: dep,
                        status: isActive ? 'Active' : 'Inactive',
                        level: level
                    });
                    findReferrals(u.userID, level + 1);
                });
            }

            findReferrals(myUID, 1);

            document.getElementById('totalTeam').innerText = `${allTeamData.length} / ৳ 0`;
            document.getElementById('teamDeposit').innerText = `৳ ${totalTeamDep.toFixed(2)}`;
            document.getElementById('activeToday').innerText = activeCount;
            
            filterTeam(currentLevel);
        } catch (err) { console.error(err); }
    }

    function filterTeam(level, btn) {
        currentLevel = level;
        if(btn) {
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        renderTable(allTeamData.filter(x => x.level === level));
    }

    function renderTable(data) {
        const body = document.getElementById('teamBody');
        if(data.length === 0) {
            body.innerHTML = `<tr><td colspan="3" style="text-align:center; padding:20px;">কোন মেম্বার নেই</td></tr>`;
            return;
        }

        body.innerHTML = data.map(u => `
            <tr>
                <td><b>${u.id}</b></td>
                <td>৳${u.dep.toFixed(2)}</td>
                <td><span class="status-badge ${u.status === 'Active' ? 'active-user' : 'inactive-user'}">${u.status}</span></td>
            </tr>
        `).join('');
    }

    function searchMember() {
        const val = document.getElementById('memberSearch').value.toLowerCase();
        const filtered = allTeamData.filter(u => u.level === currentLevel && String(u.id).includes(val));
        renderTable(filtered);
    }

    window.copyLink = function() {
        const link = document.getElementById('displayLink').innerText;
        navigator.clipboard.writeText(link).then(() => {
            const t = document.getElementById('toast');
            t.className = "show";
            setTimeout(() => { t.className = ""; }, 3000);
        });
    }

    loadPromotionData();
</script>
</body>
</html>
