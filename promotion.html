<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotion Center - Referral Program</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; color: #333; padding-bottom: 30px; }
        .header { background: #11998e; color: white; padding: 20px; text-align: center; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 100; }
        .header h2 { font-size: 20px; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        /* Referral Link Card */
        .refer-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        .refer-card h4 { font-size: 14px; color: #666; margin-bottom: 12px; }
        .refer-link-box { display: flex; background: #f8f9fa; border: 1.5px dashed #11998e; padding: 12px; border-radius: 10px; justify-content: space-between; align-items: center; gap: 10px; }
        .refer-link-box span { font-weight: bold; color: #11998e; font-size: 11px; word-break: break-all; text-align: left; line-height: 1.4; }
        .copy-btn { background: #11998e; color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold; white-space: nowrap; transition: 0.3s; }
        .copy-btn:active { transform: scale(0.95); opacity: 0.8; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-item { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 3px 10px rgba(0,0,0,0.03); border-left: 5px solid #11998e; }
        .stat-item p { font-size: 11px; color: #888; margin-bottom: 5px; font-weight: 600; }
        .stat-item h3 { font-size: 15px; color: #333; }

        /* Team Table Section */
        .team-section { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .team-section h3 { font-size: 16px; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; color: #11998e; }
        .level-tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .level-btn { padding: 8px 18px; background: #f0f0f0; border-radius: 20px; font-size: 12px; cursor: pointer; white-space: nowrap; border: none; font-weight: 600; color: #666; }
        .level-btn.active { background: #11998e; color: white; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: 12px; color: #999; padding: 10px 5px; border-bottom: 2px solid #f4f7f6; }
        td { padding: 12px 5px; font-size: 13px; border-bottom: 1px solid #f4f7f6; }
        .user-id { font-weight: bold; color: #444; }
        .level-tag { font-size: 10px; background: #e8f5e9; padding: 2px 6px; border-radius: 5px; color: #2e7d32; font-weight: bold; border: 1px solid #c8e6c9; margin-left: 5px; }

        #toast {
            visibility: hidden; min-width: 200px; background-color: #333; color: #fff;
            text-align: center; border-radius: 8px; padding: 12px; position: fixed;
            z-index: 1000; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 14px;
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

    <div id="toast">লিঙ্ক কপি হয়েছে!</div>

    <div class="header">
        <h2><i class="fas fa-bullhorn"></i> Promotion Center</h2>
    </div>

    <div class="container">
        <div class="refer-card">
            <h4><i class="fas fa-link"></i> আপনার রেফারেল লিঙ্ক শেয়ার করুন</h4>
            <div class="refer-link-box">
                <span id="refCode">লিঙ্ক তৈরি হচ্ছে...</span>
                <button class="copy-btn" onclick="copyLink()"><i class="fas fa-copy"></i> কপি</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <p>মোট টিম মেম্বার</p>
                <h3 id="totalRef">0 Members</h3>
            </div>
            <div class="stat-item">
                <p>মোট কমিশন</p>
                <h3 id="totalComm" style="color: #28a745;">৳ 0.00</h3>
            </div>
        </div>

        <div class="team-section">
            <h3><i class="fas fa-users-cog"></i> টিমের তথ্য (৩ লেভেল পর্যন্ত)</h3>
            <div class="level-tabs">
                <button class="level-btn active" onclick="changeLevel(1, this)">Level 1</button>
                <button class="level-btn" onclick="changeLevel(2, this)">Level 2</button>
                <button class="level-btn" onclick="changeLevel(3, this)">Level 3</button>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>ইউজার নাম</th>
                        <th>আইডি নম্বর</th>
                        <th>ডিপোজিট</th>
                    </tr>
                </thead>
                <tbody id="teamBody">
                    <tr><td colspan="3" style="text-align:center; padding: 20px; color: #999;">লোড হচ্ছে...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

<script>
    // আপনার Firebase কনফিগারেশন
    const firebaseConfig = {
        apiKey: "AIzaSyAoZ39EQR-Buy6QJT71P2R4wL0RyiOQaAc",
        databaseURL: "https://ai-signal-75e73-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    const userPhone = localStorage.getItem("userPhone");
    let fullTeamData = []; // সকল লেভেলের ডাটা স্টোর করার জন্য

    if(!userPhone) {
        window.location.href = "login.html";
    }

    // পেজ এবং ডাটা ইনিশিয়ালাইজ করা
    async function initPromotion() {
        // আপনার ৫ সংখ্যার আইডি সংগ্রহ করা
        const userDoc = await db.collection("users").doc(userPhone).get();
        if (userDoc.exists) {
            const data = userDoc.data();
            const myId = data.userID; 
            
            // রেফারেল লিঙ্ক জেনারেট করা
            const baseURL = window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, "");
            const fullLink = baseURL + "/index.html?ref=" + myId; 
            document.getElementById('refCode').innerText = fullLink;

            // কমিশন প্রদর্শন
            document.getElementById('totalComm').innerText = "৳ " + (data.refCommission || 0);

            // ৩ লেভেলের টিম ডাটা লোড করা
            loadTeamLogic(myId);
        }
    }

    // ৩ লেভেল টিম ডাটা লোড করার মূল লজিক
    async function loadTeamLogic(myId) {
        let count = 0;
        fullTeamData = [];

        try {
            // Level 1: যারা সরাসরি আপনার আইডি দিয়ে জয়েন করেছে
            const s1 = await db.collection("users").where("referrerID", "==", String(myId)).get();
            for (let doc1 of s1.docs) {
                const u1 = doc1.data();
                count++;
                fullTeamData.push({ name: u1.name || 'User', id: u1.userID, dep: u1.totalDeposit || 0, level: 1 });

                // Level 2: যারা লেভেল ১ মেম্বারের আইডি দিয়ে জয়েন করেছে
                const s2 = await db.collection("users").where("referrerID", "==", String(u1.userID)).get();
                for (let doc2 of s2.docs) {
                    const u2 = doc2.data();
                    count++;
                    fullTeamData.push({ name: u2.name || 'User', id: u2.userID, dep: u2.totalDeposit || 0, level: 2 });

                    // Level 3: যারা লেভেল ২ মেম্বারের আইডি দিয়ে জয়েন করেছে
                    const s3 = await db.collection("users").where("referrerID", "==", String(u2.userID)).get();
                    for (let doc3 of s3.docs) {
                        const u3 = doc3.data();
                        count++;
                        fullTeamData.push({ name: u3.name || 'User', id: u3.userID, dep: u3.totalDeposit || 0, level: 3 });
                    }
                }
            }
            document.getElementById('totalRef').innerText = count + " Members";
            renderTable(1); // শুরুতে লেভেল ১ দেখাবে
        } catch (e) {
            console.error(e);
            document.getElementById('teamBody').innerHTML = "<tr><td colspan='3' style='text-align:center;'>ডাটা লোড করতে সমস্যা হয়েছে</td></tr>";
        }
    }

    // টেবিল আপডেট করা
    function renderTable(level) {
        const body = document.getElementById('teamBody');
        const filtered = fullTeamData.filter(item => item.level === level);
        
        if (filtered.length === 0) {
            body.innerHTML = `<tr><td colspan="3" style="text-align:center; padding:20px;">লেভেল ${level}-এ কোনো মেম্বার নেই</td></tr>`;
            return;
        }

        let html = "";
        filtered.forEach(item => {
            html += `<tr>
                <td>${item.name} <span class="level-tag">L${item.level}</span></td>
                <td class="user-id">ID: ${item.id}</td>
                <td style="color:#28a745; font-weight:bold;">৳ ${item.dep}</td>
            </tr>`;
        });
        body.innerHTML = html;
    }

    // লেভেল চেঞ্জ করা
    window.changeLevel = function(level, btn) {
        document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderTable(level);
    }

    // লিঙ্ক কপি করা
    window.copyLink = function() {
        const text = document.getElementById("refCode").innerText;
        navigator.clipboard.writeText(text).then(() => {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(() => { toast.className = ""; }, 3000);
        });
    }

    initPromotion();
</script>
</body>
</html>
