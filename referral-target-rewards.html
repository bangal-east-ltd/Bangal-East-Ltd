<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referral Target Rewards</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { background: #6a11cb; color: white; padding: 20px; text-align: center; border-radius: 15px; margin-bottom: 20px; position: relative; }
        .back-btn { position: absolute; left: 15px; top: 22px; color: white; text-decoration: none; font-size: 18px; }
        .team-section { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .reward-item { display: flex; align-items: center; gap: 15px; padding: 15px; border: 1px solid #f0f0f0; border-radius: 12px; margin-bottom: 12px; }
        .reward-icon { width: 45px; height: 45px; background: #f3e5f5; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #9c27b0; font-size: 20px; }
        .progress-container { width: 100%; height: 8px; background: #eee; border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #6a11cb, #2575fc); width: 0%; transition: 0.8s ease-in-out; }
        .claim-btn { width: 85px; padding: 10px 0; border-radius: 8px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-locked { background: #e0e0e0; color: #999; cursor: not-allowed; }
        .btn-ready { background: #6a11cb; color: white; box-shadow: 0 4px 10px rgba(106, 17, 203, 0.3); }
        .btn-done { background: #e8f5e9; color: #2e7d32; cursor: default; border: 1px solid #c8e6c9; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2><i class="fas fa-gift"></i> রেফারেল রিওয়ার্ডস</h2>
    </div>

    <div class="team-section">
        <h3 style="color: #6a11cb; margin-bottom: 15px; font-size: 16px;"><i class="fas fa-users"></i> Target Progress</h3>
        <div id="rewardList">
            <p style="text-align:center; padding:20px; font-size: 13px; color: #888;">কনফিগারেশন লোড হচ্ছে...</p>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
        authDomain: "bengal-east-company-limited.firebaseapp.com",
        projectId: "bengal-east-company-limited",
        storageBucket: "bengal-east-company-limited.firebasestorage.app",
        messagingSenderId: "653223286483",
        appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const userPhone = localStorage.getItem("loggedUser");

    async function loadRewards() {
        if (!userPhone) return;

        try {
            // ১. এডমিন সেটআপ (Targets) আনা
            const configDoc = await db.collection("settings").doc("referral_config").get();
            const targets = configDoc.exists ? configDoc.data().targets : [];

            // ২. ইউজারের ডাটা আনা
            const userDoc = await db.collection("users").doc(userPhone).get();
            const userData = userDoc.data();
            const activeCount = userData.active_referrals || 0;
            const claimedRewards = userData.claimed_rewards || [];

            const listBody = document.getElementById("rewardList");
            listBody.innerHTML = "";

            if (targets.length === 0) {
                listBody.innerHTML = "<p style='text-align:center;'>কোন রিওয়ার্ড সেট করা নেই।</p>";
                return;
            }

            targets.forEach(t => {
                const isClaimed = claimedRewards.includes(t.id);
                const progress = Math.min((activeCount / t.goal) * 100, 100);
                
                // কন্ডিশন: টার্গেট পূরণ হয়েছে AND এডমিন থেকে একটিভ আছে AND আগে ক্লেইম করেনি
                const canClaim = activeCount >= t.goal && t.status === "active" && !isClaimed;

                let btnHTML = "";
                if (isClaimed) {
                    btnHTML = `<button class="claim-btn btn-done" disabled>Done</button>`;
                } else if (canClaim) {
                    btnHTML = `<button class="claim-btn btn-ready" onclick="claimReward('${t.id}', ${t.bonus})">Claim</button>`;
                } else {
                    // যদি মেম্বার সংখ্যা না পুড়ায় অথবা এডমিন থেকে Unlock না করে তবে লক থাকবে
                    const lockReason = t.status !== "active" ? "Locked by Admin" : "Claim";
                    btnHTML = `<button class="claim-btn btn-locked" disabled>${lockReason}</button>`;
                }

                listBody.innerHTML += `
                    <div class="reward-item">
                        <div class="reward-icon"><i class="fas fa-award"></i></div>
                        <div style="flex: 1;">
                            <h4 style="font-size: 13px; font-weight: 600;">${t.title}</h4>
                            <p style="font-size: 11px; color: #777;">বোনাস: ৳${t.bonus} (অগ্রগতি: ${activeCount}/${t.goal})</p>
                            <div class="progress-container">
                                <div class="progress-bar" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        ${btnHTML}
                    </div>
                `;
            });
        } catch (e) {
            console.error(e);
            document.getElementById("rewardList").innerHTML = "ত্রুটি ঘটেছে!";
        }
    }

    async function claimReward(rewardID, amount) {
        Swal.fire({
            title: 'আপনি কি নিশ্চিত?',
            text: `আপনি ৳${amount} বোনাস ক্লেইম করছেন!`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'হ্যাঁ, ক্লেইম করুন'
        }).then(async (result) => {
            if (result.isConfirmed) {
                const userRef = db.collection("users").doc(userPhone);
                try {
                    await userRef.update({
                        balance: firebase.firestore.FieldValue.increment(amount),
                        claimed_rewards: firebase.firestore.FieldValue.arrayUnion(rewardID)
                    });
                    Swal.fire('সফল!', 'বোনাস মেইন ব্যালেন্সে যোগ হয়েছে।', 'success');
                    loadRewards();
                } catch (e) {
                    Swal.fire('দুঃখিত', 'ক্লেইম ব্যর্থ হয়েছে।', 'error');
                }
            }
        });
    }

    window.onload = loadRewards;
</script>
</body>
</html>
