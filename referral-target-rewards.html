<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Referral Target Rewards</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Header Style */
        .header { background: #6a11cb; color: white; padding: 20px; text-align: center; border-radius: 15px; margin-bottom: 20px; position: relative; }
        .back-btn { position: absolute; left: 15px; top: 22px; color: white; text-decoration: none; }

        .team-section { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .reward-item { display: flex; align-items: center; gap: 15px; padding: 15px; border: 1px solid #f0f0f0; border-radius: 12px; margin-bottom: 12px; }
        
        .reward-icon { width: 45px; height: 45px; background: #f3e5f5; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #9c27b0; font-size: 20px; }
        
        .progress-container { width: 100%; height: 6px; background: #eee; border-radius: 10px; overflow: hidden; margin-top: 5px; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #6a11cb, #2575fc); width: 0%; transition: 0.5s; }
        
        .claim-btn { width: 75px; padding: 8px 0; border-radius: 8px; border: none; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn-locked { background: #e0e0e0; color: #999; cursor: not-allowed; }
        .btn-ready { background: #6a11cb; color: white; }
        .btn-done { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <h2><i class="fas fa-users"></i> রিওয়ার্ডস সেন্টার</h2>
    </div>

    <div class="team-section">
        <h3 style="color: #6a11cb; margin-bottom: 15px; font-size: 16px;">Referral Target Rewards</h3>
        
        <div id="rewardList">
            <p style="text-align:center;">লোড হচ্ছে...</p>
        </div>
    </div>
</div>

<script>
    // আপনার ফায়ারবেস কনফিগ এখানে দিন
    const firebaseConfig = {
        // আপনার কনফিগ ডাটা...
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();
    const userPhone = localStorage.getItem("loggedUser");

    // রিওয়ার্ড ডাটাবেস
    const targets = [
        { id: "ref_10", goal: 10, bonus: 500, title: "10 Active Referrals", icon: "fa-user-plus" },
        { id: "ref_20", goal: 20, bonus: 1200, title: "20 Active Referrals", icon: "fa-users-cog" },
        { id: "ref_50", goal: 50, bonus: 4000, title: "50 Active Referrals", icon: "fa-crown" }
    ];

    async function fetchRewards() {
        if (!userPhone) return;
        const userDoc = await db.collection("users").doc(userPhone).get();
        const userData = userDoc.data();
        const activeCount = userData.active_referrals || 0;
        const claimed = userData.claimed_rewards || [];

        const listDiv = document.getElementById("rewardList");
        listDiv.innerHTML = "";

        targets.forEach(t => {
            const isClaimed = claimed.includes(t.id);
            const canClaim = activeCount >= t.goal && !isClaimed;
            const progress = (activeCount / t.goal) * 100;

            listDiv.innerHTML += `
                <div class="reward-item">
                    <div class="reward-icon"><i class="fas ${t.icon}"></i></div>
                    <div style="flex: 1;">
                        <h4 style="font-size: 13px;">${t.title}</h4>
                        <p style="font-size: 10px; color: #777;">Bonus: ৳${t.bonus} (${activeCount}/${t.goal})</p>
                        <div class="progress-container">
                            <div class="progress-bar" style="width: ${progress > 100 ? 100 : progress}%"></div>
                        </div>
                    </div>
                    ${isClaimed ? '<button class="claim-btn btn-done" disabled>Done</button>' : 
                      canClaim ? `<button class="claim-btn btn-ready" onclick="claim('${t.id}', ${t.bonus})">Claim</button>` :
                      '<button class="claim-btn btn-locked" disabled>Claim</button>'}
                </div>`;
        });
    }

    async function claim(id, amt) {
        // ক্লেইম করার লজিক...
        await db.collection("users").doc(userPhone).update({
            balance: firebase.firestore.FieldValue.increment(amt),
            claimed_rewards: firebase.firestore.FieldValue.arrayUnion(id)
        });
        Swal.fire("সফল!", "বোনাস যোগ হয়েছে।", "success");
        fetchRewards();
    }

    fetchRewards();
</script>
</body>
</html>
