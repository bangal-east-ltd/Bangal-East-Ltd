<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - VIP 1 Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .admin-container { max-width: 900px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        .btn-add { width: 100%; padding: 12px; background: #11998e; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #11998e; color: white; }
        .delete-btn { color: #e53935; cursor: pointer; border: none; background: none; font-size: 18px; }
        .pkg-img { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="card">
        <h2><i class="fas fa-plus-circle"></i> Add New VIP 1 Package</h2>
        <input type="text" id="pName" placeholder="Package Name (e.g. VIP 1 Silver)">
        <input type="number" id="pPrice" placeholder="Price (৳)">
        <input type="number" id="pDaily" placeholder="Daily Income (৳)">
        <input type="number" id="pValidity" placeholder="Validity (Days)">
        <input type="text" id="pImage" placeholder="Image URL (Optional)">
        <button class="btn-add" onclick="addPackage()">Save Package</button>
    </div>

    <div class="card">
        <h2><i class="fas fa-list"></i> Market Packages</h2>
        <table>
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Daily</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="pkgTableBody"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
        authDomain: "bengal-east-company-limited.firebaseapp.com",
        projectId: "bengal-east-company-limited",
        storageBucket: "bengal-east-company-limited.firebasestorage.app",
        messagingSenderId: "653223286483",
        appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.addPackage = async function() {
        const name = document.getElementById('pName').value;
        const price = parseInt(document.getElementById('pPrice').value);
        const daily = parseInt(document.getElementById('pDaily').value);
        const validity = parseInt(document.getElementById('pValidity').value);
        const image = document.getElementById('pImage').value;

        if(!name || !price || !daily || !validity) return alert("সব তথ্য দিন!");

        await addDoc(collection(db, "packages_vip1"), { name, price, daily, validity, image });
        alert("প্যাকেজ যোগ হয়েছে!");
        location.reload();
    }

    onSnapshot(collection(db, "packages_vip1"), (snapshot) => {
        const tableBody = document.getElementById('pkgTableBody');
        tableBody.innerHTML = "";
        snapshot.forEach(child => {
            const p = child.data();
            tableBody.innerHTML += `<tr>
                <td><img src="${p.image || ''}" class="pkg-img" onerror="this.src='https://via.placeholder.com/40'"></td>
                <td>${p.name}</td>
                <td>৳${p.price}</td>
                <td>৳${p.daily}</td>
                <td><button class="delete-btn" onclick="deletePackage('${child.id}')"><i class="fas fa-trash"></i></button></td>
            </tr>`;
        });
    });

    window.deletePackage = async (id) => { if(confirm("মুছতে চান?")) await deleteDoc(doc(db, "packages_vip1", id)); };
</script>
</body>
</html>
