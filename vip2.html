<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP 2 Admin Panel - Manage Payment & Unlock</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .admin-container { max-width: 900px; margin: auto; }
        .back-btn { margin-bottom: 20px; display: inline-block; text-decoration: none; color: #8c3494; font-weight: bold; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 25px; }
        h2 { color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
        input:focus { border-color: #8c3494; }
        
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-add { background: #8c3494; color: white; }
        .btn-add:hover { background: #6a2670; }
        
        .btn-unlock { background: #28a745; color: white; margin-top: 10px; }
        .btn-unlock:disabled { background: #ccc; cursor: not-allowed; }

        .payment-status { display: flex; justify-content: space-between; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #8c3494; font-size: 14px; }

        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .user-info-card { background: #f8f9fa; padding: 15px; border-radius: 10px; border: 1px solid #eee; display: none; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 15px; }
        .info-label { font-weight: bold; color: #555; }
        .info-value { color: #8c3494; font-weight: 800; }

        .control-group { background: #fff5ff; padding: 15px; border-radius: 10px; border: 1px solid #e0b0e0; margin-top: 15px; }
        .control-label { font-weight: bold; color: #8c3494; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="admin-container">
    <a href="admin-panel.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>

    <div class="card">
        <h2><i class="fas fa-tools"></i> VIP 2 - Payment Settings</h2>
        
        <div id="currentSettings" style="margin-bottom: 20px;">
            <div class="payment-status"><span>bKash:</span> <b id="view-bkash">Loading...</b></div>
            <div class="payment-status"><span>Nagad:</span> <b id="view-nagad">Loading...</b></div>
            <div class="payment-status"><span>Rocket:</span> <b id="view-rocket">Loading...</b></div>
        </div>

        <div style="display: flex; gap: 10px;">
            <select id="setMethod">
                <option value="bkash">bKash</option>
                <option value="nagad">Nagad</option>
                <option value="rocket">Rocket</option>
            </select>
            <select id="setType">
                <option value="ক্যাশ আউট">Cash Out</option>
                <option value="সেন্ড মানি">Send Money</option>
            </select>
        </div>
        <input type="text" id="setNumber" placeholder="নতুন নম্বর দিন (যেমন: 018XXXXXXXX)">
        
        <button class="btn btn-add" onclick="updatePaymentInfo()">পেমেন্ট নম্বর আপডেট করুন</button>
    </div>

    <div class="card">
        <h2><i class="fas fa-percent"></i> Withdrawal VAT Setup</h2>
        <div class="control-group">
            <span class="control-label">Withdrawal VAT (%)</span>
            <input type="number" id="vatPercent" placeholder="ভ্যাট (%) যেমন: 10" style="margin: 0;">
        </div>
        <br>
        <button class="btn btn-add" onclick="updateVatConfig()">ভ্যাট আপডেট করুন</button>
    </div>

    <div class="card">
        <h2><i class="fas fa-user-lock"></i> Permanent Unlock Manager</h2>
        <div class="search-box">
            <input type="text" id="searchUserID" placeholder="ইউজারের ডক আইডি (Document ID) দিন">
            <button class="btn btn-add" style="width: 120px;" onclick="searchUser()">Search</button>
        </div>

        <div id="userInfoDisplay" class="user-info-card">
            <div class="info-row">
                <span class="info-label">User ID:</span>
                <span class="info-value" id="resID">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Current No:</span>
                <span class="info-value" id="resNo1">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">Status:</span>
                <span id="resStatus" style="font-weight: bold;">-</span>
            </div>
            <p style="font-size: 11px; color: #666; margin-top: 10px;">* আনলক করলে ইউজার যতক্ষণ না "Save & Lock" করবে ততক্ষণ এটি খোলা থাকবে।</p>
            <button id="unlockBtn" class="btn btn-unlock" onclick="unlockUserNumber()">Unlock Now</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
        authDomain: "bengal-east-company-limited.firebaseapp.com",
        projectId: "bengal-east-company-limited",
        storageBucket: "bengal-east-company-limited.firebasestorage.app",
        messagingSenderId: "653223286483",
        appId: "1:653223286483:web:8e4ed0782ae807f8f02626",
        measurementId: "G-R7S444H8KT"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentTargetUser = "";

    // পেমেন্ট নম্বর আপডেট
    window.updatePaymentInfo = async function() {
        const method = document.getElementById('setMethod').value;
        const type = document.getElementById('setType').value;
        const number = document.getElementById('setNumber').value;
        if(!number) { alert("নম্বর দিন!"); return; }
        try {
            await setDoc(doc(db, "admin_settings", "numbers"), { [method]: number }, { merge: true });
            await setDoc(doc(db, "admin_settings", "vip2_details"), { [method + "_type"]: type }, { merge: true });
            alert("পেমেন্ট তথ্য আপডেট হয়েছে!");
            document.getElementById('setNumber').value = "";
        } catch (e) { alert("ব্যর্থ হয়েছে! " + e.message); }
    }

    // ভ্যাট কনফিগ আপডেট
    window.updateVatConfig = async function() {
        const vat = document.getElementById('vatPercent').value;
        try {
            await setDoc(doc(db, "admin_settings", "withdrawal_config"), { vat_percentage: vat || 0 }, { merge: true });
            alert("ভ্যাট তথ্য সফলভাবে আপডেট হয়েছে!");
        } catch (e) { alert("ভ্যাট আপডেট ব্যর্থ! " + e.message); }
    }

    // ডাটা ডিসপ্লে লিসেনার
    onSnapshot(doc(db, "admin_settings", "numbers"), (snapshot) => {
        if (snapshot.exists()) {
            const data = snapshot.data();
            onSnapshot(doc(db, "admin_settings", "vip2_details"), (typeSnap) => {
                const types = typeSnap.exists() ? typeSnap.data() : {};
                if(data.bkash) document.getElementById('view-bkash').innerText = `${data.bkash} (${types.bkash_type || 'Cash Out'})`;
                if(data.nagad) document.getElementById('view-nagad').innerText = `${data.nagad} (${types.nagad_type || 'Cash Out'})`;
                if(data.rocket) document.getElementById('view-rocket').innerText = `${data.rocket} (${types.rocket_type || 'Cash Out'})`;
            });
        }
    });

    onSnapshot(doc(db, "admin_settings", "withdrawal_config"), (snap) => {
        if(snap.exists()) {
            const config = snap.data();
            document.getElementById('vatPercent').value = config.vat_percentage || 0;
        }
    });

    // ইউজার সার্চ
    window.searchUser = async function() {
        const userId = document.getElementById('searchUserID').value.trim();
        if(!userId) { alert("ID দিন!"); return; }

        const userDoc = await getDoc(doc(db, "users", userId));
        const display = document.getElementById('userInfoDisplay');

        if(userDoc.exists()) {
            const data = userDoc.data();
            currentTargetUser = userId;
            
            document.getElementById('resID').innerText = data.userID || userId;
            document.getElementById('resNo1').innerText = data.withdrawNo1 || "None";
            
            const statusEl = document.getElementById('resStatus');
            const unlockBtn = document.getElementById('unlockBtn');

            // লজিক: is_unlocked true থাকলে এটি আনলক অবস্থায় থাকবে
            if(data.is_unlocked === true) {
                statusEl.innerText = "OPEN (ইউজার এডিট করতে পারছে)";
                statusEl.style.color = "#28a745";
                unlockBtn.disabled = true;
                unlockBtn.innerText = "Already Unlocked";
            } else {
                statusEl.innerText = "LOCKED (ইউজার এডিট করতে পারছে না)";
                statusEl.style.color = "#d9534f";
                unlockBtn.disabled = false;
                unlockBtn.innerText = "Unlock Now";
            }
            display.style.display = "block";
        } else {
            display.style.display = "none";
            alert("ইউজার পাওয়া যায়নি!");
        }
    }

    // আনলক লজিক (এটি ইউজারকে স্থায়ীভাবে এডিট করার সুযোগ দিবে যতক্ষণ না সে নিজে সেভ করছে)
    window.unlockUserNumber = async function() {
        if(!currentTargetUser) return;
        
        try {
            await updateDoc(doc(db, "users", currentTargetUser), { 
                is_unlocked: true // ডাটাবেসে ট্রু করে দেওয়া হলো
            });
            alert("ইউজারকে সফলভাবে পারমিশন দেওয়া হয়েছে। সে এখন নম্বর এডিট করতে পারবে।");
            searchUser(); 
        } catch (e) { alert("Error: " + e.message); }
    }
</script>

</body>
</html>
