<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP 3 Admin Control - Bengal East Ltd</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #1a1c23; color: #edeff2; padding: 20px; }
        .admin-header { background: #24262d; padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 3px solid #11998e; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #24262d; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .card h3 { font-size: 14px; color: #888; margin-bottom: 10px; }
        .card h2 { color: #11998e; }

        .action-box { margin-top: 15px; }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: none; outline: none; }
        input { background: #2f313a; color: white; }
        button { background: #11998e; color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0e857a; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #24262d; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #2f313a; font-size: 13px; }
        th { background: #2f313a; color: #11998e; }
        .status-active { color: #2ecc71; font-weight: bold; }
        .status-inactive { color: #e74c3c; font-weight: bold; }
        .search-input { margin-bottom: 15px; border: 1px solid #11998e; }
    </style>
</head>
<body>

<div class="container">
    <div class="admin-header">
        <h2><i class="fas fa-user-shield"></i> VIP 3 Control Panel</h2>
        <div id="adminTime">Loading...</div>
    </div>

    <div class="control-grid">
        <div class="card">
            <h3>মোট ইউজার</h3>
            <h2 id="totalUsers">0</h2>
        </div>
        <div class="card">
            <h3>মোট টিম ডিপোজিট</h3>
            <h2 id="totalGlobalDep">৳ 0.00</h2>
        </div>
        <div class="card">
            <h3>আজকের কমিশন ডিস্ট্রিবিউশন</h3>
            <button onclick="distributeDailyCommission()"><i class="fas fa-coins"></i> কমিশন পাঠান (Daily)</button>
        </div>
    </div>

    <div class="card">
        <h3>ইউজার ম্যানেজমেন্ট ও ইনকাম কন্ট্রোল</h3>
        <input type="text" id="userSearch" class="search-input" placeholder="ইউজার আইডি লিখে সার্চ করুন..." onkeyup="searchUser()">
        
        <table>
            <thead>
                <tr>
                    <th>ইউজার আইডি</th>
                    <th>ফোন নম্বর</th>
                    <th>ডিপোজিট</th>
                    <th>স্ট্যাটাস</th>
                    <th>অ্যাকশন</th>
                </tr>
            </thead>
            <tbody id="userTable">
                </tbody>
        </table>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
        authDomain: "bengal-east-company-limited.firebaseapp.com",
        projectId: "bengal-east-company-limited",
        storageBucket: "bengal-east-company-limited.firebasestorage.app",
        messagingSenderId: "653223286483",
        appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let allUsers = [];

    async function loadAdminData() {
        const snapshot = await db.collection("users").get();
        allUsers = [];
        let totalDep = 0;

        snapshot.forEach(doc => {
            const data = doc.data();
            data.phone = doc.id;
            allUsers.push(data);
            totalDep += parseFloat(data.totalDeposit || 0);
        });

        document.getElementById('totalUsers').innerText = allUsers.length;
        document.getElementById('totalGlobalDep').innerText = "৳ " + totalDep.toFixed(2);
        renderUserTable(allUsers);
    }

    function renderUserTable(data) {
        const table = document.getElementById('userTable');
        table.innerHTML = data.map(u => `
            <tr>
                <td><b>${u.userID}</b></td>
                <td>${u.phone}</td>
                <td>৳${u.totalDeposit || 0}</td>
                <td><span class="${u.totalDeposit > 0 ? 'status-active' : 'status-inactive'}">
                    ${u.totalDeposit > 0 ? 'Active Member' : 'Inactive Member'}
                </span></td>
                <td>
                    <button style="padding: 5px; font-size: 10px; width: auto;" onclick="updateBalance('${u.phone}')">এডিট ব্যালেন্স</button>
                </td>
            </tr>
        `).join('');
    }

    // ডেইলি কমিশন ডিস্ট্রিবিউশন লজিক
    async function distributeDailyCommission() {
        if(!confirm("আপনি কি নিশ্চিত যে আজের ডেইলি টিম কমিশন পাঠাতে চান?")) return;

        alert("কমিশন প্রসেসিং শুরু হয়েছে... অনুগ্রহ করে অপেক্ষা করুন।");
        
        for (let user of allUsers) {
            const dailyReturn = parseFloat(user.dailyReturn || 0); // ইউজারের ডেইলি ইনকাম
            const referrerID = user.referrerID;

            if (dailyReturn > 0 && referrerID) {
                // লেভেল ১ কমিশন (উদাহরণ: ১০%)
                const commission = dailyReturn * 0.10; 
                
                // ডাটাবেসে রেফারার খুঁজে কমিশন যোগ করা
                const refQuery = await db.collection("users").where("userID", "==", String(referrerID)).get();
                if(!refQuery.empty) {
                    const refDoc = refQuery.docs[0];
                    await db.collection("users").doc(refDoc.id).update({
                        refCommission: firebase.firestore.FieldValue.increment(commission),
                        walletBalance: firebase.firestore.FieldValue.increment(commission)
                    });
                }
            }
        }
        alert("আজকের টিম কমিশন সফলভাবে ডিস্ট্রিবিউট করা হয়েছে!");
        loadAdminData();
    }

    function searchUser() {
        const val = document.getElementById('userSearch').value.toLowerCase();
        const filtered = allUsers.filter(u => String(u.userID).includes(val));
        renderUserTable(filtered);
    }

    async function updateBalance(phone) {
        const newDep = prompt("নতুন ডিপোজিট অ্যামাউন্ট লিখুন:");
        if(newDep != null) {
            await db.collection("users").doc(phone).update({ totalDeposit: parseFloat(newDep) });
            loadAdminData();
        }
    }

    setInterval(() => {
        document.getElementById('adminTime').innerText = new Date().toLocaleString();
    }, 1000);

    loadAdminData();
</script>
</body>
</html>
