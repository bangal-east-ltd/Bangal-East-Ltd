<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Admin - 10 Rows</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --vip-gold: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #b8860b 100%); --dark-bg: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .admin-container { max-width: 950px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .admin-header { background: var(--dark-bg); color: #f9f295; padding: 25px; text-align: center; border-bottom: 4px solid #d4af37; }
        .config-card { padding: 12px 20px; border-bottom: 1px solid #eee; display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 15px; align-items: center; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; font-size: 13px; }
        .vip6-btn { background: var(--vip-gold); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; width: calc(100% - 40px); margin: 20px; text-transform: uppercase; }
        .row-num { background: #333; color: #fff; width: 25px; height: 25px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 11px; margin-right: 5px; }
        .label-text { font-size: 11px; color: #888; font-weight: bold; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="admin-header"><h1><i class="fas fa-wallet"></i> Deposit Admin</h1><p>VIP 6 Exclusive (10 Levels)</p></div>
    <div id="depConfigWrapper"><p style="text-align: center; padding: 40px;">লোড হচ্ছে...</p></div>
    <button class="vip6-btn" onclick="saveDepSettings()"><i class="fas fa-save"></i> Save Deposit Rewards</button>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
        authDomain: "bengal-east-company-limited.firebaseapp.com",
        projectId: "bengal-east-company-limited",
        storageBucket: "bengal-east-company-limited.firebasestorage.app",
        messagingSenderId: "653223286483",
        appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    async function fetchDepSettings() {
        const wrapper = document.getElementById("depConfigWrapper");
        try {
            const doc = await db.collection("settings").doc("deposit_config").get();
            let targets = doc.exists ? doc.data().targets : [];
            while(targets.length < 10) targets.push({ id: "dep_"+(targets.length+1), goal: 0, bonus: 0, title: "New Deposit Level", status: "inactive" });
            wrapper.innerHTML = "";
            targets.slice(0, 10).forEach((t, i) => {
                wrapper.innerHTML += `<div class="config-card" data-id="${t.id}">
                    <div><span class="label-text"><span class="row-num">${i+1}</span> Title</span><input type="text" value="${t.title}" class="inp-title"></div>
                    <div><span class="label-text">Deposit Target</span><input type="number" value="${t.goal}" class="inp-goal"></div>
                    <div><span class="label-text">Bonus (৳)</span><input type="number" value="${t.bonus}" class="inp-bonus"></div>
                    <div><span class="label-text">Status</span><select class="inp-status"><option value="active" ${t.status==='active'?'selected':''}>Unlock</option><option value="inactive" ${t.status==='inactive'?'selected':''}>Lock</option></select></div>
                </div>`;
            });
        } catch (e) { Swal.fire("Error", "লোড ব্যর্থ", "error"); }
    }
    async function saveDepSettings() {
        const updated = Array.from(document.querySelectorAll(".config-card")).map(card => ({
            id: card.getAttribute("data-id"),
            title: card.querySelector(".inp-title").value,
            goal: parseInt(card.querySelector(".inp-goal").value) || 0,
            bonus: parseInt(card.querySelector(".inp-bonus").value) || 0,
            status: card.querySelector(".inp-status").value
        }));
        await db.collection("settings").doc("deposit_config").set({ targets: updated });
        Swal.fire("সফল", "১০টি ডিপোজিট লেভেল সেভ হয়েছে", "success");
    }
    window.onload = fetchDepSettings;
</script>
</body>
</html>
