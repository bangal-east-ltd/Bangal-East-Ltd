<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Admin - VIP 4 Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --vip-gold: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #b8860b 100%); --dark-bg: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 10px; margin: 0; }
        .admin-container { max-width: 950px; margin: 10px auto; background: white; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); overflow: hidden; }
        .admin-header { background: var(--dark-bg); color: #f9f295; padding: 20px; text-align: center; border-bottom: 4px solid #d4af37; }
        .config-card { padding: 10px 15px; border-bottom: 1px solid #eee; display: grid; grid-template-columns: 1.5fr 1fr 1fr 1.2fr; gap: 10px; align-items: center; }
        @media (max-width: 600px) { .config-card { grid-template-columns: 1fr 1fr; } }
        input, select { padding: 8px; border: 1px solid #ddd; border-radius: 8px; width: 100%; font-size: 13px; outline: none; }
        .vip6-btn { background: var(--vip-gold); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: calc(100% - 30px); margin: 15px; text-transform: uppercase; font-size: 14px; display: block; }
        .row-num { background: #333; color: #fff; width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 10px; margin-right: 5px; }
        .label-text { font-size: 10px; color: #888; font-weight: bold; display: block; margin-bottom: 4px; }
        h1 { margin: 0; font-size: 20px; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-header">
        <h1><i class="fas fa-wallet"></i> VIP 4 - Deposit Admin</h1>
        <p style="margin: 5px 0 0; font-size: 12px; opacity: 0.8;">১০টি লেভেল রিওয়ার্ড সেট করুন</p>
    </div>
    
    <div id="depConfigWrapper">
        <p style="text-align: center; padding: 40px;"><i class="fas fa-spinner fa-spin"></i> ডাটা লোড হচ্ছে...</p>
    </div>

    <button class="vip6-btn" onclick="saveDepSettings()">
        <i class="fas fa-save"></i> Save Deposit Rewards
    </button>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
        authDomain: "bengal-east-company-limited.firebaseapp.com",
        projectId: "bengal-east-company-limited",
        storageBucket: "bengal-east-company-limited.firebasestorage.app",
        messagingSenderId: "653223286483",
        appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // ডাটা লোড করার ফাংশন
    async function fetchDepSettings() {
        const wrapper = document.getElementById("depConfigWrapper");
        try {
            // ক্যাশে এড়িয়ে সরাসরি সার্ভার থেকে ডাটা আনতে force-network ব্যবহার করা যেতে পারে
            const doc = await db.collection("settings").doc("deposit_config").get();
            let targets = [];
            
            if (doc.exists && doc.data().targets) {
                targets = doc.data().targets;
            }

            // সবসময় ১০টি রো নিশ্চিত করা
            while(targets.length < 10) {
                targets.push({ 
                    id: "dep_" + (targets.length + 1) + "_" + Math.floor(Math.random() * 1000), 
                    goal: 0, 
                    bonus: 0, 
                    title: "New Level", 
                    status: "inactive" 
                });
            }

            let htmlString = "";
            targets.slice(0, 10).forEach((t, i) => {
                htmlString += `
                <div class="config-card" data-id="${t.id}">
                    <div>
                        <span class="label-text"><span class="row-num">${i+1}</span> Title</span>
                        <input type="text" value="${t.title}" class="inp-title" placeholder="লেভেল নাম">
                    </div>
                    <div>
                        <span class="label-text">Deposit Target</span>
                        <input type="number" value="${t.goal}" class="inp-goal">
                    </div>
                    <div>
                        <span class="label-text">Bonus (৳)</span>
                        <input type="number" value="${t.bonus}" class="inp-bonus">
                    </div>
                    <div>
                        <span class="label-text">Status</span>
                        <select class="inp-status">
                            <option value="active" ${t.status === 'active' ? 'selected' : ''}>Unlock</option>
                            <option value="inactive" ${t.status === 'inactive' ? 'selected' : ''}>Lock</option>
                        </select>
                    </div>
                </div>`;
            });
            wrapper.innerHTML = htmlString;
        } catch (e) { 
            console.error(e);
            wrapper.innerHTML = `<p style="text-align: center; color: red; padding: 20px;">ত্রুটি: ডাটা লোড করা যায়নি।</p>`;
        }
    }

    // ডাটা সেভ করার ফাংশন
    async function saveDepSettings() {
        // লোডিং অ্যালার্ট
        Swal.fire({ title: 'প্রসেসিং...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

        const cards = document.querySelectorAll(".config-card");
        const updated = Array.from(cards).map(card => ({
            id: card.getAttribute("data-id"),
            title: card.querySelector(".inp-title").value,
            goal: parseInt(card.querySelector(".inp-goal").value) || 0,
            bonus: parseInt(card.querySelector(".inp-bonus").value) || 0,
            status: card.querySelector(".inp-status").value
        }));

        try {
            await db.collection("settings").doc("deposit_config").set({ targets: updated });
            Swal.fire({ icon: 'success', title: 'সফল', text: '১০টি লেভেল সঠিকভাবে আপডেট হয়েছে।', timer: 2000 });
        } catch (e) {
            Swal.fire("Error", "সেভ করতে সমস্যা হয়েছে: " + e.message, "error");
        }
    }

    // পেজ লোড হলে ফাংশনটি রান করবে
    window.onload = fetchDepSettings;
</script>

</body>
</html>
