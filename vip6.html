<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Betting Admin - VIP 6</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root { --vip-gold: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #b8860b 100%); --dark-bg: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .admin-container { max-width: 850px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
        .admin-header { background: var(--dark-bg); color: #f9f295; padding: 25px; text-align: center; border-bottom: 4px solid #d4af37; }
        .config-card { padding: 15px; border-bottom: 1px solid #eee; display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 10px; align-items: center; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 8px; width: 100%; }
        .vip6-btn { background: var(--vip-gold); color: #000; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase; }
        .label-text { font-size: 11px; color: #666; font-weight: bold; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="admin-container">
    <div class="admin-header">
        <h1><i class="fas fa-dice"></i> Daily Betting Admin</h1>
        <p>VIP 6 Exclusive Controller</p>
    </div>

    <div style="padding: 20px;">
        <div id="betConfigWrapper">
            <p style="text-align: center;">লোড হচ্ছে...</p>
        </div>
        <button class="vip6-btn" onclick="saveBetSettings()">
            <i class="fas fa-save"></i> Save Betting Rewards
        </button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
        authDomain: "bengal-east-company-limited.firebaseapp.com",
        projectId: "bengal-east-company-limited",
        storageBucket: "bengal-east-company-limited.firebasestorage.app",
        messagingSenderId: "653223286483",
        appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    async function fetchBetSettings() {
        const wrapper = document.getElementById("betConfigWrapper");
        try {
            const doc = await db.collection("settings").doc("betting_config").get();
            let targets = doc.exists ? doc.data().targets : [
                { id: "bet_1", goal: 2000, bonus: 100, title: "Bet ৳2000 Daily", status: "active" },
                { id: "bet_2", goal: 5000, bonus: 300, title: "Bet ৳5000 Daily", status: "active" }
            ];

            wrapper.innerHTML = "";
            targets.forEach(t => {
                wrapper.innerHTML += `
                    <div class="config-card" data-id="${t.id}">
                        <div><span class="label-text">Title</span><input type="text" value="${t.title}" class="inp-title"></div>
                        <div><span class="label-text">Bet Target (৳)</span><input type="number" value="${t.goal}" class="inp-goal"></div>
                        <div><span class="label-text">Bonus (৳)</span><input type="number" value="${t.bonus}" class="inp-bonus"></div>
                        <div><span class="label-text">Status</span>
                            <select class="inp-status">
                                <option value="active" ${t.status === 'active' ? 'selected' : ''}>Unlock</option>
                                <option value="inactive" ${t.status === 'inactive' ? 'selected' : ''}>Lock</option>
                            </select>
                        </div>
                    </div>`;
            });
        } catch (e) { Swal.fire("Error", "ডাটা লোড হয়নি", "error"); }
    }

    async function saveBetSettings() {
        const cards = document.querySelectorAll(".config-card");
        const updatedTargets = Array.from(cards).map(card => ({
            id: card.getAttribute("data-id"),
            title: card.querySelector(".inp-title").value,
            goal: parseInt(card.querySelector(".inp-goal").value),
            bonus: parseInt(card.querySelector(".inp-bonus").value),
            status: card.querySelector(".inp-status").value
        }));

        try {
            await db.collection("settings").doc("betting_config").set({ targets: updatedTargets });
            Swal.fire("Success", "বেটিং রিওয়ার্ড আপডেট হয়েছে!", "success");
        } catch (e) { Swal.fire("Error", "সেভ হয়নি", "error"); }
    }
    window.onload = fetchBetSettings;
</script>
</body>
</html>
