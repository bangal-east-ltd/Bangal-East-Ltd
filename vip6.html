<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP 6 Master Admin Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --vip-gold: linear-gradient(135deg, #d4af37 0%, #f9f295 50%, #b8860b 100%); --dark-bg: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 10px; margin: 0; }
        .master-wrapper { max-width: 1000px; margin: 0 auto; }
        .admin-section { background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 30px; border: 1px solid #ddd; }
        .admin-header { background: var(--dark-bg); color: #f9f295; padding: 15px; text-align: center; border-bottom: 4px solid #d4af37; }
        .config-card { padding: 10px 15px; border-bottom: 1px solid #eee; display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 10px; align-items: center; }
        @media (max-width: 650px) { .config-card { grid-template-columns: 1fr 1fr; } }
        input, select { padding: 8px; border: 1px solid #ddd; border-radius: 6px; width: 100%; font-size: 13px; }
        .vip6-btn { background: var(--vip-gold); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: calc(100% - 30px); margin: 15px; text-transform: uppercase; display: block; }
        .row-num { background: #333; color: #fff; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-size: 10px; margin-right: 5px; }
        .label-text { font-size: 11px; color: #888; font-weight: bold; display: block; margin-bottom: 3px; }
        h2 { margin: 0; font-size: 20px; }
    </style>
</head>
<body>

<div class="master-wrapper">
    <div class="admin-section">
        <div class="admin-header"><h2><i class="fas fa-dice"></i> Daily Betting Rewards</h2></div>
        <div id="betConfigWrapper"><p style="text-align: center; padding: 20px;">লোড হচ্ছে...</p></div>
        <button class="vip6-btn" onclick="saveData('betting_config', 'betConfigWrapper')"><i class="fas fa-save"></i> Save Betting Rewards</button>
    </div>

    <div class="admin-section">
        <div class="admin-header"><h2><i class="fas fa-users"></i> Referral Rewards</h2></div>
        <div id="refConfigWrapper"><p style="text-align: center; padding: 20px;">লোড হচ্ছে...</p></div>
        <button class="vip6-btn" onclick="saveData('referral_config', 'refConfigWrapper')"><i class="fas fa-save"></i> Save Referral Rewards</button>
    </div>

    <div class="admin-section">
        <div class="admin-header"><h2><i class="fas fa-wallet"></i> Deposit Rewards</h2></div>
        <div id="depConfigWrapper"><p style="text-align: center; padding: 20px;">লোড হচ্ছে...</p></div>
        <button class="vip6-btn" onclick="saveData('deposit_config', 'depConfigWrapper')"><i class="fas fa-save"></i> Save Deposit Rewards</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
        authDomain: "bengal-east-company-limited.firebaseapp.com",
        projectId: "bengal-east-company-limited",
        storageBucket: "bengal-east-company-limited.firebasestorage.app",
        messagingSenderId: "653223286483",
        appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    async function loadSection(docName, wrapperId, idPrefix) {
        const wrapper = document.getElementById(wrapperId);
        try {
            const doc = await db.collection("settings").doc(docName).get();
            let targets = [];
            
            if (doc.exists && doc.data().targets) {
                targets = doc.data().targets;
            }

            // যদি ডাটা না থাকে বা ১০টার কম থাকে, তবে ডিফল্ট ১০টি রো তৈরি করবে
            let defaultDataNeeded = 10 - targets.length;
            for(let i=0; i<defaultDataNeeded; i++) {
                targets.push({ 
                    id: idPrefix + "_" + (targets.length + 1), 
                    goal: 0, 
                    bonus: 0, 
                    title: "New Level", 
                    status: "inactive" 
                });
            }

            let html = "";
            targets.slice(0, 10).forEach((t, i) => {
                html += `
                    <div class="config-card" data-id="${t.id}">
                        <div><span class="label-text"><span class="row-num">${i+1}</span> Title</span><input type="text" value="${t.title}" class="inp-title"></div>
                        <div><span class="label-text">Target</span><input type="number" value="${t.goal}" class="inp-goal"></div>
                        <div><span class="label-text">Bonus (৳)</span><input type="number" value="${t.bonus}" class="inp-bonus"></div>
                        <div><span class="label-text">Status</span>
                            <select class="inp-status">
                                <option value="active" ${t.status === 'active' ? 'selected' : ''}>Unlock</option>
                                <option value="inactive" ${t.status === 'inactive' ? 'selected' : ''}>Lock</option>
                            </select>
                        </div>
                    </div>`;
            });
            wrapper.innerHTML = html;
        } catch (e) { 
            console.error(e);
            wrapper.innerHTML = "<p style='color:red; text-align:center;'>ডাটা লোড করতে সমস্যা হয়েছে।</p>";
        }
    }

    async function saveData(docName, wrapperId) {
        const cards = document.querySelectorAll(`#${wrapperId} .config-card`);
        const updatedTargets = Array.from(cards).map(card => ({
            id: card.getAttribute("data-id"),
            title: card.querySelector(".inp-title").value,
            goal: parseInt(card.querySelector(".inp-goal").value) || 0,
            bonus: parseInt(card.querySelector(".inp-bonus").value) || 0,
            status: card.querySelector(".inp-status").value
        }));

        try {
            await db.collection("settings").doc(docName).set({ targets: updatedTargets });
            Swal.fire("সফল!", "সেটিংস আপডেট হয়েছে!", "success");
        } catch (e) { 
            Swal.fire("ত্রুটি", "সেভ করা যায়নি: " + e.message, "error"); 
        }
    }

    // পেজ লোড হওয়ার পর ডাটা কল করা
    document.addEventListener('DOMContentLoaded', () => {
        loadSection('betting_config', 'betConfigWrapper', 'bet');
        loadSection('referral_config', 'refConfigWrapper', 'ref');
        loadSection('deposit_config', 'depConfigWrapper', 'dep');
    });
</script>

</body>
</html>
