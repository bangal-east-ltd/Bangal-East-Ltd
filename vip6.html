<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP 6 - Admin Advanced Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #008080; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .card { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 18px; display: flex; align-items: center; gap: 10px; }
        
        /* Reset Styles */
        .reset-item { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .reset-item:last-child { border-bottom: none; }
        .reset-item input { width: 18px; height: 18px; margin-right: 12px; cursor: pointer; }
        .save-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 15px; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-top: 15px; }
        .stat-box { background: #e0f2f1; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #b2dfdb; }
        .stat-box h3 { margin: 0; font-size: 13px; color: #555; text-transform: uppercase; }
        .stat-box p { margin: 8px 0 0; font-size: 20px; font-weight: 800; color: var(--primary); }
        .amount { color: #e74c3c !important; }

        .notice { font-size: 12px; color: #666; background: #fff3e0; padding: 10px; border-radius: 6px; border-left: 4px solid #ff9800; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2><i class="fas fa-history"></i> অটো-রিসেট ও ডেটা প্রোটেকশন</h2>
        <div class="notice">
            <i class="fas fa-info-circle"></i> <b>নিয়ম:</b> রাত ১২টার পর তারিখ পরিবর্তন হলে অটোমেটিক রিসেট শুরু হবে। যেসব অপশনে <b>টিক মার্ক</b> থাকবে, সেগুলো ডিলিট হবে না (সেভ থাকবে)। টিক মার্ক না থাকলে সেগুলো রিসেট হয়ে যাবে।
        </div>
        
        <form id="resetControlForm">
            <div class="reset-item">
                <input type="checkbox" id="withdraw_history" name="noReset" value="withdraw_history">
                <label for="withdraw_history">Withdrawal History (উইথড্র হিস্টোরি সেভ রাখুন)</label>
            </div>
            <div class="reset-item">
                <input type="checkbox" id="deposit_history" name="noReset" value="deposit_history">
                <label for="deposit_history">Deposit History (ডিপোজিট হিস্টোরি সেভ রাখুন)</label>
            </div>
            <div class="reset-item">
                <input type="checkbox" id="auto_history" name="noReset" value="auto_history">
                <label for="auto_history">Daily Collection Auto History (সেভ রাখুন)</label>
            </div>
            <button type="submit" class="save-btn">কনফিগারেশন সেভ করুন</button>
        </form>
    </div>

    <div class="card">
        <h2><i class="fas fa-chart-line"></i> প্ল্যাটফর্ম স্ট্যাটিস্টিক্স</h2>
        <div class="stats-grid" id="mainStats">
            <div class="stat-box">
                <h3>Total Deposit</h3>
                <p id="totalDep">৳ 0</p>
            </div>
            <div class="stat-box">
                <h3>Total Withdraw</h3>
                <p id="totalWith" class="amount">৳ 0</p>
            </div>
            <div class="stat-box">
                <h3>Total VIP Members</h3>
                <p id="totalVip">0 জন</p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs, query, where, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
        authDomain: "bengal-east-company-limited.firebaseapp.com",
        projectId: "bengal-east-company-limited",
        storageBucket: "bengal-east-company-limited.firebasestorage.app",
        messagingSenderId: "653223286483",
        appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ১. রিসেট সেটিংস লোড ও সেভ
    async function initSettings() {
        const snap = await getDoc(doc(db, "admin_settings", "auto_reset_config"));
        if (snap.exists()) {
            snap.data().noResetList.forEach(val => {
                const cb = document.getElementById(val);
                if (cb) cb.checked = true;
            });
        }
    }

    document.getElementById('resetControlForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const checked = Array.from(document.querySelectorAll('input[name="noReset"]:checked')).map(cb => cb.value);
        await setDoc(doc(db, "admin_settings", "auto_reset_config"), { 
            noResetList: checked,
            updateAt: new Date().toLocaleDateString() 
        });
        alert("সফলভাবে সেভ হয়েছে!");
    });

    // ২. স্ট্যাটিস্টিক্স লোড (Deposit & Withdraw)
    async function fetchStats() {
        // Deposit Calculation
        const depSnap = await getDocs(collection(db, "deposits"));
        let depSum = 0;
        depSnap.forEach(doc => depSum += Number(doc.data().amount || 0));
        document.getElementById('totalDep').innerText = "৳ " + depSum;

        // Withdraw Calculation
        const withSnap = await getDocs(collection(db, "withdraws"));
        let withSum = 0;
        withSnap.forEach(doc => withSum += Number(doc.data().amount || 0));
        document.getElementById('totalWith').innerText = "৳ " + withSum;

        // VIP Members
        const vipSnap = await getDocs(query(collection(db, "users"), where("package", "!=", "Free")));
        document.getElementById('totalVip').innerText = vipSnap.size + " জন";
    }

    // ৩. অটোমেটিক রিসেট লজিক (২৪ ঘণ্টা পর পর)
    async function checkAndReset() {
        const today = new Date().toLocaleDateString();
        const configRef = doc(db, "admin_settings", "auto_reset_config");
        const configSnap = await getDoc(configRef);

        if (configSnap.exists()) {
            const lastReset = configSnap.data().lastResetDate;
            if (lastReset !== today) {
                // তারিখ পরিবর্তন হয়েছে, এখন রিসেট শুরু হবে
                const noResetList = configSnap.data().noResetList || [];

                // ১. উইথড্র হিস্টোরি রিসেট
                if (!noResetList.includes("withdraw_history")) {
                    const q = await getDocs(collection(db, "withdraws"));
                    q.forEach(async (d) => await deleteDoc(doc(db, "withdraws", d.id)));
                }

                // ২. ডিপোজিট হিস্টোরি রিসেট
                if (!noResetList.includes("deposit_history")) {
                    const q = await getDocs(collection(db, "deposits"));
                    q.forEach(async (d) => await deleteDoc(doc(db, "deposits", d.id)));
                }

                // ৩. অটো হিস্টোরি রিসেট
                if (!noResetList.includes("auto_history")) {
                    const q = await getDocs(collection(db, "daily_collection"));
                    q.forEach(async (d) => await deleteDoc(doc(db, "daily_collection", d.id)));
                }

                // রিসেট সম্পন্ন হওয়ার পর তারিখ আপডেট
                await setDoc(configRef, { lastResetDate: today }, { merge: true });
                console.log("Auto-reset completed for " + today);
            }
        }
    }

    window.onload = () => {
        initSettings();
        fetchStats();
        checkAndReset(); // পেজ লোড হলেই তারিখ চেক করবে
    };
</script>
</body>
</html>
