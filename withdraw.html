<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - ai-signal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; color: #333; padding-bottom: 50px; }
        .header { display: flex; align-items: center; padding: 15px 20px; background: white; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .header h3 { flex: 1; text-align: center; font-size: 18px; margin-right: 30px; }
        .header a { color: #333; text-decoration: none; font-size: 20px; }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .balance-section { background: linear-gradient(135deg, #ff8c00, #e67e00); padding: 30px 20px; border-radius: 20px; color: white; text-align: center; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(230, 126, 0, 0.2); }
        .balance-section h2 { font-size: 32px; margin-top: 5px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #ff8c00; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; font-weight: 600; }
        .input-field { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 10px; font-size: 15px; outline: none; background: #fafafa; }
        .action-btn { width: 100%; padding: 14px; border: none; background: #ff8c00; color: white; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .action-btn:disabled { background: #ccc; }
        .history-item { background: white; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #ff8c00; margin-bottom: 10px; }
        .status { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; }
        .status.Pending { background: #fff3cd; color: #856404; }
        .status.Approved { background: #d4edda; color: #155724; }
        .status.Rejected { background: #f8d7da; color: #721c24; }
        #timeNotice { color: red; font-size: 12px; text-align: center; margin-top: 5px; display: none; font-weight: bold; }

        /* পপ-আপ ডিজাইন */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-card { background: white; padding: 30px; border-radius: 20px; text-align: center; max-width: 90%; width: 350px; }
        .modal-card i { font-size: 50px; color: #28a745; margin-bottom: 15px; }
        .modal-card h2 { color: #333; margin-bottom: 10px; }
        .modal-card p { color: #666; line-height: 1.5; font-size: 14px; }
        .modal-btn { margin-top: 20px; width: 100%; padding: 12px; background: #ff8c00; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="successModal">
        <div class="modal-card">
            <i class="fas fa-check-circle"></i>
            <h2>Withdrawal Success</h2>
            <p>২৪ ঘন্টার মধ্যে আপনার ওয়ালেটে টাকা পৌঁছে যাবে ইনশাল্লাহ।</p>
            <button class="modal-btn" onclick="closeModal()">OK</button>
        </div>
    </div>

    <div class="header">
        <a href="account.html"><i class="fas fa-chevron-left"></i></a>
        <h3>Withdraw System</h3>
    </div>

    <div class="container">
        <div class="balance-section">
            <p>Your Current Balance</p>
            <h2>৳ <span id="userBalance">0.00</span></h2>
        </div>

        <div class="card" id="numberSetupCard">
            <div class="card-title"><i class="fas fa-id-card"></i> Setup Withdraw Numbers</div>
            <div class="input-group">
                <label>Withdraw Number 1</label>
                <input type="number" id="savedNo1" class="input-field" placeholder="01XXXXXXXXX">
            </div>
            <div class="input-group">
                <label>Withdraw Number 2</label>
                <input type="number" id="savedNo2" class="input-field" placeholder="01XXXXXXXXX (Optional)">
            </div>
            <button class="action-btn" id="saveNumBtn" onclick="saveWithdrawNumbers()">Save & Lock Numbers</button>
        </div>

        <div class="card">
            <div class="card-title"><i class="fas fa-money-bill-wave"></i> Create Withdrawal</div>
            <div class="input-group">
                <label>Select Receiver Number</label>
                <select id="selectedNo" class="input-field">
                    <option value="">-- Choose Number --</option>
                </select>
            </div>
            <div class="input-group">
                <label>Method</label>
                <select id="method" class="input-field">
                    <option value="bKash">bKash</option>
                    <option value="Nagad">Nagad</option>
                    <option value="Rocket">Rocket</option>
                </select>
            </div>
            <div class="input-group">
                <label>Amount (৳300 - ৳50000)</label> <input type="number" id="amount" class="input-field" placeholder="Enter amount">
            </div>
            <button class="action-btn" id="withdrawBtn" onclick="requestWithdraw()">Confirm Withdrawal</button>
            <p id="timeNotice">উইথড্র সময়: সকাল ০৮:০০ থেকে রাত ০৮:০০ পর্যন্ত।</p>
        </div>

        <div style="font-weight: bold; margin-bottom: 10px;"><i class="fas fa-history"></i> Recent Withdrawals</div>
        <div id="withdrawHistory"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCALYxA2M4BwIXq5KC3VMGsZpAFh8nL3fo",
            authDomain: "bengal-east-company-limited.firebaseapp.com",
            projectId: "bengal-east-company-limited",
            storageBucket: "bengal-east-company-limited.firebasestorage.app",
            messagingSenderId: "653223286483",
            appId: "1:653223286483:web:8e4ed0782ae807f8f02626"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const loggedUser = localStorage.getItem("loggedUser");

        if (!loggedUser) window.location.replace("index.html");

        onSnapshot(doc(db, "users", loggedUser), (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.data();
                document.getElementById("userBalance").innerText = parseFloat(data.balance || 0).toFixed(2);
                const select = document.getElementById("selectedNo");
                select.innerHTML = '<option value="">-- Choose Number --</option>';
                if (data.withdrawNo1) {
                    document.getElementById("savedNo1").value = data.withdrawNo1;
                    document.getElementById("savedNo1").disabled = true;
                    select.innerHTML += `<option value="${data.withdrawNo1}">${data.withdrawNo1}</option>`;
                }
                if (data.withdrawNo2) {
                    document.getElementById("savedNo2").value = data.withdrawNo2;
                    document.getElementById("savedNo2").disabled = true;
                    select.innerHTML += `<option value="${data.withdrawNo2}">${data.withdrawNo2}</option>`;
                }
                if(data.withdrawNo1 && data.withdrawNo2) document.getElementById("saveNumBtn").style.display = "none";
            }
        });

        window.saveWithdrawNumbers = async function() {
            const n1 = document.getElementById("savedNo1").value;
            const n2 = document.getElementById("savedNo2").value;
            if (n1.length < 11) { alert("সঠিক নম্বর দিন!"); return; }
            await updateDoc(doc(db, "users", loggedUser), { withdrawNo1: n1, withdrawNo2: n2 || "" });
            alert("নম্বর সেভ হয়েছে।");
        };

        // উইথড্র ফাংশন আপডেট করা হয়েছে
        window.requestWithdraw = async function() {
            const amount = parseFloat(document.getElementById("amount").value);
            const method = document.getElementById("method").value;
            const receiverNo = document.getElementById("selectedNo").value;
            const currentBal = parseFloat(document.getElementById("userBalance").innerText);

            // লিমিট চেক (৩০০ - ৫০,০০০)
            if (!receiverNo || isNaN(amount) || amount < 300 || amount > 50000) {
                alert("ভুল তথ্য! সর্বনিম্ন ৩০০ থেকে সর্বোচ্চ ৫০,০০০ টাকা উইথড্র করা যাবে।"); return;
            }
            if (amount > currentBal) {
                alert("আপনার পর্যাপ্ত ব্যালেন্স নেই!"); return;
            }

            const today = new Date().toLocaleDateString();
            const userRef = doc(db, "users", loggedUser);
            const userSnap = await getDoc(userRef);

            if (userSnap.data().lastWithdrawDate === today) {
                alert("আজকে একবার উইথড্র করেছেন। আগামীকাল চেষ্টা করুন।"); return;
            }

            document.getElementById("withdrawBtn").disabled = true;

            try {
                await updateDoc(userRef, { balance: currentBal - amount, lastWithdrawDate: today });
                await addDoc(collection(db, "withdraws"), {
                    user: loggedUser,
                    amount: amount,
                    method: method,
                    receiver_no: receiverNo,
                    status: "Pending",
                    timestamp: Date.now(),
                    time: new Date().toLocaleString()
                });
                
                // পপ-আপ দেখানো
                document.getElementById("successModal").style.display = "flex";
                document.getElementById("amount").value = "";
            } catch (e) {
                alert("কিছু সমস্যা হয়েছে, আবার চেষ্টা করুন।");
            } finally {
                document.getElementById("withdrawBtn").disabled = false;
            }
        };

        window.closeModal = function() {
            document.getElementById("successModal").style.display = "none";
        };

        const q = query(collection(db, "withdraws"), where("user", "==", loggedUser));
        onSnapshot(q, (snapshot) => {
            const hist = document.getElementById("withdrawHistory");
            hist.innerHTML = "";
            let items = [];
            snapshot.forEach(doc => items.push(doc.data()));
            items.sort((a,b) => b.timestamp - a.timestamp).forEach(data => {
                hist.innerHTML += `
                    <div class="history-item">
                        <div>
                            <p style="font-size:14px; font-weight:bold;">৳ ${data.amount} (${data.receiver_no})</p>
                            <span style="font-size:10px; color:#888;">${data.time}</span>
                        </div>
                        <div class="status ${data.status}">${data.status}</div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
